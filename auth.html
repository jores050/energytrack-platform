<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-page">

<div class="auth-card">

<h1 style="margin-bottom:25px;">
Créer votre compte EnergyTrack
</h1>

<input type="text" id="name" placeholder="Nom complet">

<input type="email" id="email" placeholder="Adresse email">

<input type="password" id="password" placeholder="Mot de passe">

<input type="text" id="company" placeholder="Nom entreprise">

<input type="text" id="selectedSensor" placeholder="Capteur choisi" readonly>

<div style="display:flex;gap:10px;margin-top:15px;">

<button onclick="completeSignup()" style="flex:1;">
Inscription
</button>

<button onclick="loginUser()" style="flex:1;background:#0f1729;">
Connexion
</button>

</div>

<p onclick="resetPassword()"
style="text-align:center;margin-top:20px;color:#00c896;cursor:pointer;">
Mot de passe oublié ?
</p>

<button onclick="window.location.href='index.html'"
style="width:100%;background:#0f1729;margin-top:10px;">
Retour accueil
</button>

</div>

</div>

<script src="js/supabase.js"></script>

<script src="js/auth.js"></script>

</body>
</html>
