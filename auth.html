<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Authentification • EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

.auth-container{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
background:
radial-gradient(circle at top left,rgba(0,200,150,0.15),transparent 30%),
radial-gradient(circle at bottom right,rgba(0,174,239,0.12),transparent 30%),
#0b1220;
}

.auth-card{
width:100%;
max-width:520px;
background:linear-gradient(145deg,#182235,#101826);
border:1px solid rgba(255,255,255,0.05);
border-radius:32px;
padding:40px;
box-shadow:0 25px 80px rgba(0,0,0,0.45);
}

.auth-logo{
font-family:'Orbitron',sans-serif;
font-size:36px;
color:#00c896;
text-align:center;
margin-bottom:10px;
}

.auth-logo span{
color:#fff;
}

.auth-subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:35px;
line-height:1.7;
}

.auth-tabs{
display:flex;
gap:12px;
margin-bottom:30px;
}

.auth-tab{
flex:1;
padding:16px;
border-radius:14px;
background:#0f1729;
border:none;
color:#94a3b8;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.auth-tab.active{
background:linear-gradient(135deg,#00c896,#00aeef);
color:#fff;
}

.auth-form{
display:none;
}

.auth-form.active{
display:block;
}

.auth-footer{
margin-top:25px;
text-align:center;
}

.auth-footer a{
color:#00c896;
text-decoration:none;
font-weight:500;
}

.auth-message{
margin-top:18px;
padding:14px;
border-radius:14px;
display:none;
font-weight:500;
}

.success{
background:rgba(0,200,150,0.15);
color:#00c896;
}

.error{
background:rgba(255,76,97,0.15);
color:#ff4c61;
}

.loading{
opacity:0.7;
pointer-events:none;
}

</style>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="auth-logo">
Energy<span>Track</span>
</div>

<p class="auth-subtitle">

Plateforme SaaS intelligente de monitoring énergétique
et optimisation IoT en temps réel.

</p>

<div class="auth-tabs">

<button id="loginTab"
class="auth-tab active"
onclick="switchTab('login')">

Connexion

</button>

<button id="signupTab"
class="auth-tab"
onclick="switchTab('signup')">

Inscription

</button>

</div>

<!-- LOGIN -->

<div id="loginForm"
class="auth-form active">

<input type="email"
id="loginEmail"
placeholder="Adresse email">

<input type="password"
id="loginPassword"
placeholder="Mot de passe">

<button
style="width:100%;"
onclick="loginUser()">

Se connecter

</button>

<div class="auth-footer">

<a href="#"
onclick="resetPassword()">

Mot de passe oublié ?

</a>

</div>

</div>

<!-- SIGNUP -->

<div id="signupForm"
class="auth-form">

<input type="text"
id="signupName"
placeholder="Nom complet">

<input type="email"
id="signupEmail"
placeholder="Adresse email">

<input type="password"
id="signupPassword"
placeholder="Mot de passe">

<input type="text"
id="signupCompany"
placeholder="Entreprise (optionnel)">

<button
style="width:100%;"
onclick="completeSignup()">

Créer mon compte

</button>

</div>

<div id="authMessage"
class="auth-message">

</div>

<div class="auth-footer">

<a href="index.html">

← Retour accueil

</a>

</div>

</div>

</div>

<script>

const supabaseUrl='https://prvsatpdgybnevolzhhf.supabase.co';

const supabaseKey='sb_publishable_7_4_m1j5CWGD196X8e0LVw_gJC9xgCf';

const supabaseClient=supabase.createClient(
supabaseUrl,
supabaseKey
);

function switchTab(tab){

document.getElementById('loginTab').classList.remove('active');
document.getElementById('signupTab').classList.remove('active');

document.getElementById('loginForm').classList.remove('active');
document.getElementById('signupForm').classList.remove('active');

if(tab==='login'){

document.getElementById('loginTab').classList.add('active');
document.getElementById('loginForm').classList.add('active');

}else{

document.getElementById('signupTab').classList.add('active');
document.getElementById('signupForm').classList.add('active');

}

}

function showMessage(message,type){

const box=document.getElementById('authMessage');

box.style.display='block';

box.className='auth-message '+type;

box.innerHTML=message;

}

async function completeSignup(){

const name=document.getElementById('signupName').value;

const email=document.getElementById('signupEmail').value;

const password=document.getElementById('signupPassword').value;

if(name==='' || email==='' || password===''){

showMessage(
'Veuillez remplir tous les champs.',
'error'
);

return;

}

const { data, error } =
await supabaseClient.auth.signUp({

email:email,
password:password

});

if(error){

showMessage(error.message,'error');

return;

}

/*
Création profil SaaS
*/

await supabaseClient

.from('profiles')

.insert([{

id:user.id,

full_name:name,

email:email

}]);

localStorage.setItem('energytrackUser',

JSON.stringify({

name:name,
email:email

})

);

showMessage(
'Compte créé avec succès.',
'success'
);

setTimeout(()=>{

window.location.href='payment.html';

},1500);

}

async function loginUser(){

const email =
document.getElementById('loginEmail').value;

const password =
document.getElementById('loginPassword').value;

if(email==='' || password===''){

showMessage(
'Veuillez entrer votre email et mot de passe.',
'error'
);

return;

}

const { data, error } =
await supabaseClient.auth.signInWithPassword({

email:email,
password:password

});

if(error){

showMessage(
'Email ou mot de passe incorrect.',
'error'
);

return;

}

const userId = data.user.id;

/*
VÉRIFIER SI UTILISATEUR
A DÉJÀ UN SITE
*/

const { data:sites, error:siteError } =
await supabaseClient

.from('sites')

.select('*')

.eq('user_id',userId);

if(siteError){

console.log(siteError);

showMessage(
'Erreur chargement utilisateur.',
'error'
);

return;

}

/*
SI SITE EXISTE
→ DASHBOARD
*/

if(sites && sites.length > 0){

window.location.href='dashboard.html';

return;

}

/*
SINON
→ SETUP
*/

window.location.href='setup.html';

}

async function resetPassword(){

const email=document.getElementById('loginEmail').value;

if(email===''){

showMessage(
'Veuillez entrer votre email.',
'error'
);

return;

}

const { error } =
await supabaseClient.auth.resetPasswordForEmail(email);

if(error){

showMessage(error.message,'error');

return;

}

showMessage(
'Email de réinitialisation envoyé.',
'success'
);

}

</script>

</body>
</html>
