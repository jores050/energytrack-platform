<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EnergyTrack Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0b1220;
            font-family: Poppins;
            color: white;
            padding: 50px;
        }

        .card {
            background: #182235;
            padding: 35px;
            border-radius: 28px;
            max-width: 900px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .metric {
            background: #101826;
            padding: 20px;
            border-radius: 18px;
        }

        .metric-value {
            font-size: 32px;
            font-family: Orbitron;
            color: #00c896;
            margin-top: 10px;
        }

        select {
            width: 100%;
            padding: 15px;
            background: #101826;
            border: none;
            border-radius: 12px;
            color: white;
            margin-top: 15px;
        }

        button {
            padding: 15px 24px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
        }

        .start {
            background: #00c896;
            color: white;
        }

        .stop {
            background: #ff4c61;
            color: white;
        }

        .log {
            background: #101826;
            padding: 20px;
            border-radius: 20px;
            margin-top: 30px;
            max-height: 300px;
            overflow: auto;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>⚡ EnergyTrack Simulator</h1>

        <select id="siteSelector" onchange="loadSensors()">
            <option value="">Choisir site</option>
        </select>

        <select id="sensorSelector">
            <option value="">Choisir capteur</option>
        </select>

        <div class="grid">
            <div class="metric">Voltage <div id="voltage" class="metric-value">0V</div></div>
            <div class="metric">Puissance <div id="power" class="metric-value">0W</div></div>
            <div class="metric">Température <div id="temperature" class="metric-value">0°C</div></div>
            <div class="metric">Source <div id="source" class="metric-value">SBEE</div></div>
        </div>

        <button class="start" onclick="startSimulation()">▶ Démarrer</button>
        <button class="stop" onclick="stopSimulation()">⛔ Stop</button>

        <div id="log" class="log">Logs…</div>
    </div>

    <script>
        let simulation = false;
        let interval = null;
        let lastAlert = {};

        async function getUser() {
            const { data: userData } = await supabaseClient.auth.getUser();
            if (!userData.user) {
                location.href = 'auth.html';
                return null;
            }
            return userData.user;
        }

        function canTriggerAlert(type) {
            const now = Date.now();
            if (!lastAlert[type] || now - lastAlert[type] > 60000) {
                lastAlert[type] = now;
                return true;
            }
            return false;
        }

        async function loadSites() {
            const user = await getUser();
            if (!user) return;

            const { data: sites } = await supabaseClient
                .from('sites')
                .select('*')
                .eq('user_id', user.id);

            const selector = document.getElementById('siteSelector');
            selector.innerHTML = '<option value="">Choisir site</option>';

            if (sites) {
                sites.forEach(site => {
                    selector.innerHTML += `<option value="${site.id}">${site.name}</option>`;
                });
            }
        }

        async function loadSensors() {
            const site = document.getElementById('siteSelector').value;

            const { data: sensors } = await supabaseClient
                .from('sensors')
                .select('*')
                .eq('site_id', site);

            const selector = document.getElementById('sensorSelector');
            selector.innerHTML = '<option value="">Choisir capteur</option>';

            if (sensors) {
                sensors.forEach(sensor => {
                    selector.innerHTML += `<option value="${sensor.id}">${sensor.name}</option>`;
                });
            }
        }

        async function startSimulation() {
            if (simulation) {
                console.log('Simulation déjà active');
                return;
            }

            const site = document.getElementById('siteSelector').value;
            const sensor = document.getElementById('sensorSelector').value;

            if (site === '' || sensor === '') {
                alert('Sélectionnez un site ET un capteur');
                return;
            }

            // ÉTAPE BONUS BACKEND : Aller chercher dynamiquement les configs dans 'settings'
            let tariffGroupe = 350; // Valeur de repli si pas trouvé en BDD
            const { data: settingsData } = await supabaseClient
                .from('settings')
                .select('tariff_groupe')
                .limit(1)
                .maybeSingle();
            
            if (settingsData && settingsData.tariff_groupe) {
                tariffGroupe = settingsData.tariff_groupe;
            }

            simulation = true;
            document.getElementById('log').innerHTML = '▶ Simulation démarrée<br>';

            await supabaseClient
                .from('sensors')
                .update({ status: 'ONLINE' })
                .eq('id', sensor);

            interval = setInterval(async () => {
                // 1. Simulations électriques de base
                const voltage = Math.floor(Math.random() * 20) + 210; // Voltage plus réaliste (210V - 230V)
                const power = Math.floor(Math.random() * 5000);
                const current = (power / voltage).toFixed(2);
                const kwh = (power * 5 / 3600000).toFixed(5);
                const temperature = Math.floor(20 + Math.random() * 20);
                
                // 2. Simulation de la source d'énergie et sbee_ok
                const source = Math.random() > 0.85 ? 'GROUPE' : 'SBEE';
                const sbee_ok = (source === 'SBEE');

                // 3. Nouvelles colonnes de télémétrie simulées
                const pf = parseFloat((0.82 + Math.random() * 0.16).toFixed(3)); // Facteur de puissance réaliste (0.82 à 0.98)
                const freq = parseFloat((49.8 + Math.random() * 0.4).toFixed(2)); // Fréquence réseau stable (49.8Hz à 50.2Hz)
                
                // Active Power (ap) = Même valeur que power_w pour le simulateur basique
                const ap = parseFloat(power.toFixed(2)); 

                // 4. Calcul du coût dynamique en FCFA
                // Si source = GROUPE, on applique le tarif du groupe (ex: 350F/kWh), sinon tarif SBEE classique (ex: 110F/kWh)
                const currentTariff = sbee_ok ? 110 : tariffGroupe;
                const cost_fcfa = Math.round(kwh * currentTariff);

                // 5. Insertion dans la table telemetry de Supabase avec toutes les colonnes
                const { data, error } = await supabaseClient
                    .from('telemetry')
                    .insert([{
                        sensor_id: sensor,
                        site_id: site,
                        voltage: voltage,
                        current: current,
                        power_w: power,
                        kwh_total: kwh,
                        temperature: temperature,
                        source: source,
                        pf: pf,               // <-- AJOUTÉ
                        ap: ap,               // <-- AJOUTÉ
                        freq: freq,           // <-- AJOUTÉ
                        sbee_ok: sbee_ok,     // <-- AJOUTÉ
                        cost_fcfa: cost_fcfa  // <-- AJOUTÉ
                    }])
                    .select();

                if (error) {
                    document.getElementById('log').innerHTML = '❌ ' + error.message + '<br>' + document.getElementById('log').innerHTML;
                    return;
                }

                // Mise à jour de l'affichage UI
                document.getElementById('voltage').innerHTML = voltage + 'V';
                document.getElementById('power').innerHTML = power + 'W';
                document.getElementById('temperature').innerHTML = temperature + '°C';
                document.getElementById('source').innerHTML = source;

                document.getElementById('log').innerHTML = `✅ ${power}W | ${voltage}V | PF: ${pf} | Freq: ${freq}Hz | Coût: ${cost_fcfa} FCFA<br>` + document.getElementById('log').innerHTML;
            }, 5000);
        }

        async function stopSimulation() {
            clearInterval(interval);
            simulation = false;

            const sensor = document.getElementById('sensorSelector').value;

            await supabaseClient
                .from('sensors')
                .update({ status: 'OFFLINE' })
                .eq('id', sensor);
                
            document.getElementById('log').innerHTML = '⛔ Simulation arrêtée<br>' + document.getElementById('log').innerHTML;
        }

        loadSites();
    </script>
</body>
</html>
