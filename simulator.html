<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
EnergyTrack Simulator
</title>

<script src="
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2
"></script>

<script src="
js/supabase.js
"></script>

<link href="
https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap
"
rel="stylesheet">

<style>

body{

background:#0b1220;
color:white;
font-family:Poppins;
padding:50px;

}

.card{

background:#182235;
padding:35px;
border-radius:28px;
max-width:850px;
margin:auto;

}

.value{

font-size:40px;
color:#00c896;

}

.grid{

display:grid;
grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:20px;
margin-top:25px;

}

button{

padding:16px 22px;
border:none;
border-radius:14px;
margin-top:20px;
cursor:pointer;

}

.start{

background:#00c896;
color:white;

}

.stop{

background:#ff4c61;
color:white;

}

.log{

background:#0f1729;
padding:20px;
margin-top:25px;
border-radius:18px;
max-height:260px;
overflow:auto;

}

select{

width:100%;
padding:16px;
border:none;
border-radius:14px;
margin-top:18px;
background:#101826;
color:white;

}

</style>

</head>

<body>

<div class="card">

<h1>

⚡ EnergyTrack Simulator v3

</h1>


<select
id="siteSelector"
onchange="loadSensors()">

<option>

Choisir site

</option>

</select>


<select
id="sensorSelector">

<option>

Choisir capteur

</option>

</select>


<div class="grid">

<div>

<p>

Voltage

</p>

<div
class="value"
id="voltage">

0V

</div>

</div>


<div>

<p>

Puissance

</p>

<div
class="value"
id="power">

0W

</div>

</div>


<div>

<p>

Source

</p>

<div
class="value"
id="source">

SBEE

</div>

</div>

</div>


<button

class="start"

onclick="startSimulation()">

Démarrer

</button>


<button

class="stop"

onclick="stopSimulation()">

Stop

</button>


<div
id="log"
class="log">

Logs…

</div>

</div>



<script>

let simulation=false;

let interval=null;

let lastAlert={};



async function getUser(){

const {

data:userData

}

=

await supabaseClient

.auth

.getUser();


if(

!userData.user

){

location.href=

'auth.html';

return null;

}


return userData.user;

}



function canTriggerAlert(type){

const now=

Date.now();

if(

!lastAlert[type]

||

now-lastAlert[type]

>60000

){

lastAlert[type]=

now;

return true;

}

return false;

}



async function loadSites(){

const user=

await getUser();

if(!user)return;


const {

data:sites

}

=

await supabaseClient

.from(

'sites'

)

.select('*')

.eq(

'user_id',

user.id

);


const selector=

document

.getElementById(

'siteSelector'

);


selector.innerHTML=

'<option>Choisir site</option>';


sites.forEach(

site=>{

selector.innerHTML+=`

<option

value="${site.id}"

>

${site.name}

</option>

`;

}

);

}



async function loadSensors(){

const site=

document

.getElementById(

'siteSelector'

)

.value;


const {

data:sensors

}

=

await supabaseClient

.from(

'sensors'

)

.select('*')

.eq(

'site_id',

site

);


const selector=

document

.getElementById(

'sensorSelector'

);


selector.innerHTML=

'<option>Choisir capteur</option>';


sensors.forEach(

sensor=>{

selector.innerHTML+=`

<option

value="${sensor.id}"

>

${sensor.name}

</option>

`;

}

);

}



async function startSimulation(){

if(simulation)

return;


const site=

document

.getElementById(

'siteSelector'

)

.value;


const sensor=

document

.getElementById(

'sensorSelector'

)

.value;


if(

!site

||

!sensor

){

alert(

'Sélectionner site + capteur'

);

return;

}



simulation=true;



await supabaseClient

.from(

'sensors'

)

.update({

status:

'ONLINE'

})

.eq(

'id',

sensor

);



interval=

setInterval(

async()=>{


const voltage=

Math.floor(

Math.random()*220

)+40;


const power=

Math.floor(

Math.random()*5000

);


const current=

(

power

/

voltage

).toFixed(2);


const kwh=

(

power*5

/

3600000

).toFixed(5);


const source=

Math.random()>0.8

?

'GROUPE'

:

'SBEE';



document

.getElementById(

'voltage'

)

.innerHTML=

voltage+

'V';



document

.getElementById(

'power'

)

.innerHTML=

power+

'W';



document

.getElementById(

'source'

)

.innerHTML=

source;



await supabaseClient

.from(

'telemetry'

)

.insert([{

sensor_id:

sensor,

site_id:

site,

voltage,

current,

power_w:

power,

kwh_total:

kwh,

source

}]);


if(

voltage<190

&&

canTriggerAlert(

'LOW'

)

){

await supabaseClient

.from(

'alerts'

)

.insert([{

sensor_id:

sensor,

site_id:

site,

type:

'LOW_VOLTAGE',

message:

'Tension basse',

value:

voltage,

threshold:

190

}]);

}



if(

power>3000

&&

canTriggerAlert(

'OVER'

)

){

await supabaseClient

.from(

'alerts'

)

.insert([{

sensor_id:

sensor,

site_id:

site,

type:

'OVERCONSUMPTION',

message:

'Surconsommation',

value:

power,

threshold:

3000

}]);

}



const sensorName=

document

.getElementById(

'sensorSelector'

)

.options[

document

.getElementById(

'sensorSelector'

)

.selectedIndex

]

.text;



const log=

document

.getElementById(

'log'

);


log.innerHTML=

'✅ '

+

sensorName

+

' | '

+

power

+

'W | '

+

voltage

+

'V<br>'

+

log.innerHTML;



},

5000);

}



async function stopSimulation(){

clearInterval(

interval

);

simulation=false;


const sensor=

document

.getElementById(

'sensorSelector'

)

.value;


await supabaseClient

.from(

'sensors'

)

.update({

status:

'OFFLINE'

})

.eq(

'id',

sensor

);


document

.getElementById(

'log'

)

.innerHTML=

'⛔ STOP<br>'

+

document

.getElementById(

'log'

)

.innerHTML;

}



loadSites();

</script>

</body>
</html>
