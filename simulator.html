<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EnergyTrack Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap"
rel="stylesheet">

<style>
body{
background:#0b1220;
font-family:Poppins;
color:white;
padding:50px;
}
.card{
background:#182235;
padding:35px;
border-radius:28px;
max-width:900px;
margin:auto;
}
.grid{\ndisplay:grid;\ngrid-template-columns:\nrepeat(\nauto-fit,\nminmax(\n180px,\n1fr\n)\n);\ngap:20px;\nmargin-top:25px;\n}\n.metric{\nbackground:#101826;\npadding:20px;\nborder-radius:18px;\n}\n.metric-value{\nfont-size:40px;\nfont-family:Orbitron;\ncolor:#00c896;\nmargin-top:10px;\n}\nselect{\nwidth:100%;\npadding:15px;\nbackground:#101826;\nborder:1px solid #1f2c44;\ncolor:white;\nborder-radius:14px;\nfont-size:16px;\n}\nbutton{\nbackground:#00c896;\nborder:none;\ncolor:#0b1220;\npadding:15px 35px;\nborder-radius:14px;\nfont-weight:600;\nfont-size:16px;\ncursor:pointer;\nwidth:100%;\nmargin-top:25px;\ntransition:all .2s;\n}\nbutton:hover{\nbackground:#00b084;\n}\n</style>
</head>

<body>

<div class="card">
<h1 style="font-size:28px;font-weight:600;margin-bottom:10px">EnergyTrack Simulator v2.1</h1>
<p style="color:#7a8fac">Simulez l'envoi de données électriques en temps réel vers Supabase.</p>

<div class="grid">
<div>
<label style="font-size:14px;color:#7a8fac">Sélectionner un site</label>
<select id="siteSelect" onchange="loadSensors()"></select>
</div>
<div>
<label style="font-size:14px;color:#7a8fac">Sélectionner un capteur</label>
<select id="sensorSelect"></select>
</div>
</div>

<button id="btn" onclick="toggleSim()">▶️ Démarrer la simulation (5s)</button>

<div class="grid">
<div class="metric">
<div style="font-size:14px;color:#7a8fac">Tension</div>
<div class="metric-value" id="voltage">--V</div>
</div>
<div class="metric">
<div style="font-size:14px;color:#7a8fac">Puissance</div>
<div class="metric-value" id="power">--W</div>
</div>
<div class="metric">
<div style="font-size:14px;color:#7a8fac">Température</div>
<div class="metric-value" id="temperature">--°C</div>
</div>
<div class="metric">
<div style="font-size:14px;color:#7a8fac">Source active</div>
<div class="metric-value" id="source" style="color:#f5a623">--</div>
</div>
</div>

<div id="log" style="margin-top:30px;background:#0a101d;padding:20px;border-radius:18px;font-family:monospace;font-size:13px;color:#7a8fac;max-height:200px;overflow-y:auto"></div>
</div>

<script>
let timer=null;

async function init(){\nconst {data:sites}=await supabaseClient.from('sites').select('*');\nlet html='';\nsites.forEach(s=>{\nhtml+=`<option value="${s.id}">${s.name || s.id}</option>`;\n});\ndocument.getElementById('siteSelect').innerHTML=html;\nawait loadSensors();\n}\n\nasync function loadSensors(){\nconst siteId=document.getElementById('siteSelect').value;\nconst {data:sensors}=await supabaseClient.from('sensors').select('*').eq('site_id',siteId);\nlet html='';\nsensors.forEach(s=>{\nhtml+=`<option value="${s.id}">${s.name}</option>`;\n});\ndocument.getElementById('sensorSelect').innerHTML=html;\n}\n\nfunction toggleSim(){\nif(timer){\nclearInterval(timer);\ntimer=null;\ndocument.getElementById('btn').innerHTML='▶️ Démarrer la simulation (5s)';\n}else{\ntimer=setInterval(sendData,5000);\nsendData();\ndocument.getElementById('btn').innerHTML='⏸️ Arrêter la simulation';\n}\n}\n\nasync function sendData(){\nconst site=document.getElementById('siteSelect').value;\nconst sensor=document.getElementById('sensorSelect').value;\n\nif(!site || !sensor){\nalert('Veuillez ajouter un site et un capteur d\\'abord.');\nreturn;\n}\n\nconst voltage=Math.floor(Math.random()>0.15 ? 200+Math.random()*30 : 90+Math.random()*40);\nconst power=Math.floor(Math.random()*5000);\nconst current=(power/voltage).toFixed(2);\nconst kwh=(power*5/3600000).toFixed(5);\nconst temperature=Math.floor(20+Math.random()*20);\n\n// --- DEUX VARIABLES CORRIGÉES ET AJOUTÉES POUR LE SIMULATEUR ---\nconst power_factor=parseFloat((0.8+Math.random()*0.2).toFixed(2));\nconst frequency_hz=parseFloat((49.5+Math.random()*1.0).toFixed(1));\n// -----------------------------------------------------------------\n\nconst source=Math.random()>0.8 ? 'GROUPE' : 'SBEE';\n\nconst {data,error}=await supabaseClient\n.from('telemetry')\n.insert([{\nsensor_id:sensor,\nsite_id:site,\nvoltage,\ncurrent, // Enregistré sous la colonne 'current'\npower_w:power,\nkwh_total:kwh,\ntemperature,\nsource,\npower_factor, // Ajouté\nfrequency_hz  // Ajouté\n}])
