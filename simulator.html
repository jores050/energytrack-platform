<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EnergyTrack Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#0b1220;
color:white;
font-family:'Poppins',sans-serif;
padding:60px;
}

.card{
background:#182235;
padding:35px;
border-radius:28px;
max-width:700px;
margin:auto;
}

h1{
font-family:'Orbitron',sans-serif;
margin-bottom:25px;
}

.value{
font-size:42px;
margin-top:10px;
color:#00c896;
}

button{
padding:18px 28px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#00c896,#00aeef);
color:white;
font-weight:600;
cursor:pointer;
margin-top:30px;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
opacity:0.95;
}

.log{
margin-top:25px;
background:#0f1729;
padding:20px;
border-radius:18px;
max-height:250px;
overflow:auto;
line-height:1.8;
}

select{
width:100%;
padding:16px;
border:none;
border-radius:16px;
margin-top:20px;
background:#101826;
color:white;
font-size:16px;
}

</style>

</head>

<body>

<div class="card">

<h1>
⚡ EnergyTrack Live Simulator
</h1>

<p>
Simulation temps réel d’un capteur énergétique ESP32.
</p>

<select id="siteSelector">

<option value="">
Choisir un site
</option>

</select>

<div style="margin-top:30px;">

<p>
Tension :
</p>

<div class="value" id="voltage">
0 V
</div>

</div>

<div style="margin-top:25px;">

<p>
Puissance :
</p>

<div class="value" id="power">
0 W
</div>

</div>

<div style="margin-top:25px;">

<p>
Source :
</p>

<div class="value" id="source">
SBEE
</div>

</div>

<button onclick="startSimulation()">

Démarrer la simulation

</button>

<button onclick="stopSimulation()"
style="
background:#ff4c61;
margin-left:15px;
">

Arrêter la simulation

</button>

<div class="log" id="log">

Logs simulation...

</div>

</div>

<script>

let simulationRunning = false;

let simulationInterval = null;

let lastAlertTime = {};

/*
ANTI-SPAM ALERTES
*/

function canTriggerAlert(type){

const now = Date.now();

if(

!lastAlertTime[type]

||

(now - lastAlertTime[type]) > 60000

){

lastAlertTime[type] = now;

return true;

}

return false;

}

/*
LOAD SITES
*/

async function loadSites(){

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return;

}

const userId =
userData.user.id;

const { data:sites, error } =
await supabaseClient

.from('sites')

.select('*')

.eq('user_id',userId);

if(error){

console.log(error);

return;

}

const selector =
document.getElementById('siteSelector');

selector.innerHTML = `

<option value="">
Choisir un site
</option>

`;

sites.forEach(site=>{

selector.innerHTML += `

<option value="${site.id}">

${site.name}

</option>

`;

});

}

/*
START SIMULATION
*/

async function startSimulation(){

if(simulationRunning){

return;

}

const selectedSite =
document.getElementById('siteSelector').value;

if(selectedSite===''){

alert('Veuillez sélectionner un site.');

return;

}

simulationRunning = true;

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

alert('Utilisateur non connecté');

return;

}

const userId = userData.user.id;

const siteName =
document.getElementById('siteSelector')
.selectedOptions[0]
.text;

simulationInterval = setInterval(async()=>{

/*
VALEURS SIMULÉES
*/

const voltage =
Math.floor(Math.random()*220)+40;

const power =
Math.floor(Math.random()*5000);

const current =
(power/voltage).toFixed(2);

/*
KWH RÉALISTE
5 secondes
*/

const kwh =
((power * 5) / 3600000).toFixed(5);

const source =
Math.random()>0.8
? 'GROUPE'
: 'SBEE';

/*
ALERTES AUTOMATIQUES
*/

if(
voltage < 190
&& canTriggerAlert('LOW_VOLTAGE')
){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

site_id:selectedSite,

site_name:siteName,

type:'LOW_VOLTAGE',

message:'Tension basse détectée',

value:voltage,

threshold:190

}]);

}

if(
power > 3000
&& canTriggerAlert('OVERCONSUMPTION')
){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

site_id:selectedSite,

site_name:siteName,

type:'OVERCONSUMPTION',

message:'Surconsommation détectée',

value:power,

threshold:3000

}]);

}

if(
voltage < 50
&& canTriggerAlert('SBEE_OUTAGE')
){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

site_id:selectedSite,

site_name:siteName,

type:'SBEE_OUTAGE',

message:'Coupure SBEE détectée',

value:voltage,

threshold:50

}]);

}

if(
voltage > 250
&& canTriggerAlert('HIGH_VOLTAGE')
){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

site_id:selectedSite,

site_name:siteName,

type:'HIGH_VOLTAGE',

message:'Surtension détectée',

value:voltage,

threshold:250

}]);

}

/*
UI
*/

document.getElementById('voltage').innerHTML =
voltage+' V';

document.getElementById('power').innerHTML =
power+' W';

document.getElementById('source').innerHTML =
source;

/*
INSERT TELEMETRY
*/

const { error } =
await supabaseClient

.from('telemetry')

.insert([{

sensor_id:userId,

site_id:selectedSite,

site_name:siteName,

voltage:voltage,

current:current,

power_w:power,

kwh_total:kwh,

source:source

}]);

if(error){

console.log(error);

return;

}

/*
LOGS
*/

const log =
document.getElementById('log');

log.innerHTML =

'✅ '

+new Date().toLocaleTimeString()

+' → '

+power+' W | '

+voltage+' V | '

+source

+'<br>🏢 '

+siteName

+'<br><br>'

+log.innerHTML;

},5000);

}

/*
STOP
*/

function stopSimulation(){

clearInterval(simulationInterval);

simulationRunning=false;

document.getElementById('log').innerHTML =

'⛔ Simulation arrêtée.<br><br>'

+document.getElementById('log').innerHTML;

}

/*
INIT
*/

loadSites();

</script>

</body>

</html>
