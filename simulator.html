<script>
let simulationRunning = false;
let simulationInterval = null;

// Initialisation au chargement
window.onload = function() {
    checkUser();
};

async function checkUser() {
    const { data: userData } = await supabaseClient.auth.getUser();
    if (!userData.user) {
        window.location.href = 'auth.html';
    }
}

async function startSimulation() {
    if (simulationRunning) return;

    const selector = document.getElementById('siteSelector');
    const selectedSiteValue = selector.value;
    const selectedSiteName = selector.options[selector.selectedIndex].text;

    if (selectedSiteValue === '') {
        alert('Veuillez sélectionner un site.');
        return;
    }

    const { data: userData } = await supabaseClient.auth.getUser();
    if (!userData.user) {
        alert('Utilisateur non connecté');
        return;
    }

    const userId = userData.user.id;
    simulationRunning = true;

    simulationInterval = setInterval(async () => {
        // VALEURS SIMULÉES
        const voltage = Math.floor(Math.random() * 220) + 40;
        const power = Math.floor(Math.random() * 5000);
        const current = (power / voltage).toFixed(2);
        const kwh = (power / 1000).toFixed(2);
        const source = Math.random() > 0.8 ? 'GROUPE' : 'SBEE';

        // ALERTES
        if (voltage < 190 || power > 3000 || voltage < 50 || voltage > 250) {
            let type = 'INFO';
            let msg = 'RAS';
            
            if(voltage < 190) { type = 'LOW_VOLTAGE'; msg = 'Tension basse'; }
            else if(power > 3000) { type = 'OVERCONSUMPTION'; msg = 'Surconsommation'; }
            else if(voltage < 50) { type = 'SBEE_OUTAGE'; msg = 'Coupure SBEE'; }
            
            await supabaseClient.from('alerts').insert([{
                sensor_id: userId,
                site_id: selectedSiteValue,
                site_name: selectedSiteName,
                type: type,
                message: msg,
                value: (type === 'OVERCONSUMPTION' ? power : voltage)
            }]);
        }

        // MISE À JOUR UI
        document.getElementById('voltage').innerHTML = voltage + ' V';
        document.getElementById('power').innerHTML = power + ' W';
        document.getElementById('source').innerHTML = source;

        // INSERT TELEMETRY
        const { error } = await supabaseClient.from('telemetry').insert([{
            sensor_id: userId,
            site_id: selectedSiteValue,
            voltage: voltage,
            current: current,
            power_w: power,
            kwh_total: kwh,
            source: source
        }]);

        if (error) console.error("Erreur Telemetry:", error);

        // LOGS
        const log = document.getElementById('log');
        log.innerHTML = `✅ ${new Date().toLocaleTimeString()} → ${power}W | ${voltage}V | ${source}<br>🏢 Site : ${selectedSiteName}<br><br>${log.innerHTML}`;

    }, 5000);
}

function stopSimulation() {
    clearInterval(simulationInterval);
    simulationRunning = false;
    document.getElementById('log').innerHTML = '⛔ Simulation arrêtée.<br><br>' + document.getElementById('log.innerHTML');
}
</script>
