<script>

let simulationRunning=false;

async function startSimulation(){

if(simulationRunning){

return;

}

simulationRunning=true;

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

alert('Utilisateur non connecté');

return;

}

const userId = userData.user.id;

setInterval(async()=>{

/*
VALEURS SIMULÉES
*/

const voltage =
Math.floor(Math.random()*40)+190;

const power =
Math.floor(Math.random()*3000)+500;

const current =
(power/voltage).toFixed(2);

const kwh =
(power/1000).toFixed(2);

const source =
Math.random()>0.8
? 'GROUPE'
: 'SBEE';

/*
ALERTES
*/

if(voltage < 190){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

type:'LOW_VOLTAGE',

message:'Tension basse détectée',

value:voltage,

threshold:190

}]);

}

if(voltage > 250){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

type:'HIGH_VOLTAGE',

message:'Surtension détectée',

value:voltage,

threshold:250

}]);

}

if(power > 3000){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

type:'OVERCONSUMPTION',

message:'Surconsommation détectée',

value:power,

threshold:3000

}]);

}

if(voltage < 50){

await supabaseClient

.from('alerts')

.insert([{

sensor_id:userId,

type:'SBEE_OUTAGE',

message:'Coupure SBEE détectée',

value:voltage,

threshold:50

}]);

}

/*
UI
*/

document.getElementById('voltage').innerHTML =
voltage+' V';

document.getElementById('power').innerHTML =
power+' W';

document.getElementById('source').innerHTML =
source;

/*
INSERT SUPABASE
*/

const { error } =
await supabaseClient

.from('telemetry')

.insert([{

sensor_id:userId,

voltage:voltage,

current:current,

power_w:power,

kwh_total:kwh,

source:source

}]);

if(error){

console.log(error);

return;

}

/*
LOGS
*/

const log =
document.getElementById('log');

log.innerHTML =

'✅ '+new Date().toLocaleTimeString()

+' → '

+power+' W | '

+voltage+' V | '

+source

+'<br><br>'

+log.innerHTML;

},5000);

}

</script>
