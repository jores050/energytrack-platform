<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

EnergyTrack Simulator V4

</title>


<script src="
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2
"></script>

<script src="
js/supabase.js
"></script>


<link
href="
https://fonts.googleapis.com/css2?
family=Poppins:wght@300;400;500;600&
family=Orbitron:wght@500;700&
display=swap
"
rel="stylesheet">


<style>

body{

background:#0b1220;
font-family:Poppins;
color:white;
padding:40px;

}


.card{

background:#182235;
padding:35px;
border-radius:28px;
max-width:950px;
margin:auto;

}


.grid{

display:grid;

grid-template-columns:

repeat(
auto-fit,
minmax(
180px,
1fr
)

);

gap:20px;

margin-top:30px;

}


.metric{

background:#101826;

padding:20px;

border-radius:18px;

}


.metric-value{

font-size:38px;

font-family:Orbitron;

color:#00c896;

margin-top:8px;

}


button{

padding:18px;

border:none;

border-radius:15px;

font-weight:700;

cursor:pointer;

margin-top:25px;

}


.start{

background:#00c896;
color:white;

}


.stop{

background:#ff4c61;
color:white;

}


select{

width:100%;
padding:15px;

background:#101826;

border:none;

border-radius:12px;

color:white;

margin-top:15px;

}


.log{

background:#101826;

padding:20px;

border-radius:18px;

height:250px;

overflow:auto;

margin-top:30px;

}

</style>

</head>


<body>


<div class="card">


<h1>

⚡ EnergyTrack Simulator

</h1>



<select

id="siteSelector"

onchange="loadSensors()"

>

<option>

Choisir site

</option>

</select>



<select

id="sensorSelector"

>

<option>

Choisir capteur

</option>

</select>



<div class="grid">


<div class="metric">

Voltage

<div
id="voltage"
class="metric-value">

0V

</div>

</div>



<div class="metric">

Puissance

<div
id="power"
class="metric-value">

0W

</div>

</div>



<div class="metric">

Température

<div
id="temp"
class="metric-value">

0°C

</div>

</div>



<div class="metric">

Source

<div
id="source"
class="metric-value">

SBEE

</div>

</div>


<div class="metric">

Coût

<div
id="cost"
class="metric-value">

0F

</div>

</div>



<div class="metric">

PF

<div
id="pf"
class="metric-value">

0.95

</div>

</div>


</div>



<button

onclick="startSimulation()"

class="start"

>

▶ Démarrer

</button>



<button

onclick="stopSimulation()"

class="stop"

>

⛔ Stop

</button>



<div
id="log"
class="log">

Logs…

</div>



</div>



<script>


let running=false;

let interval=null;

let alerts={};



async function getUser(){

const {

data:userData

}

=

await supabaseClient

.auth

.getUser();



return

userData.user;

}




async function loadSites(){

const user=

await getUser();



const {

data

}

=

await supabaseClient

.from(

"sites"

)

.select("*")

.eq(

"user_id",

user.id

);



let html=

`

<option value="">

Choisir site

</option>

`;



data.forEach(

site=>{

html+=

`

<option

value="${site.id}"

>

${site.name}

</option>

`;

}

);



document

.getElementById(

"siteSelector"

)

.innerHTML=

html;


}




async function loadSensors(){


let site=

document

.getElementById(

"siteSelector"

)

.value;



const {

data

}

=

await supabaseClient

.from(

"sensors"

)

.select("*")

.eq(

"site_id",

site

);



let html=

`

<option>

Choisir capteur

</option>

`;



data.forEach(

sensor=>{


html+=

`

<option

value="${sensor.id}"

>

${sensor.name}

</option>

`;



});



document

.getElementById(

"sensorSelector"

)

.innerHTML=

html;


}




async function createAlert(

sensor,

site,

type,

message,

value,

threshold

){


if(

alerts[type]

&&

Date.now()

-

alerts[type]

<60000

){

return;

}



alerts[type]

=

Date.now();



await supabaseClient

.from(

"alerts"

)

.insert([{

sensor_id:

sensor,

site_id:

site,

type,

message,

value,

threshold,

status:

"ACTIVE"

}]);


}





async function startSimulation(){


if(

running

)

return;



let site=

document

.getElementById(

"siteSelector"

)

.value;



let sensor=

document

.getElementById(

"sensorSelector"

)

.value;



if(

!site

||

!sensor

){

alert(

"Choisir site + capteur"

);

return;

}



running=true;



await supabaseClient

.from(

"sensors"

)

.update({

status:

"ONLINE"

})

.eq(

"id",

sensor);




interval=

setInterval(

async()=>{



let voltage=

190+

Math.random()

*60;



let current=

Math.random()

*20;



let pf=

0.8+

Math.random()

*0.2;



let power=

Math.round(

voltage*

current*

pf

);



let ap=

Math.round(

voltage*

current

);



let freq=

49+

Math.random()

*2;



let temp=

20+

Math.random()

*25;



let battery=

40+

Math.random()

*60;



let source=

Math.random()

>.2

?

"SBEE"

:

"GROUPE";



let sbee_ok=

source==="SBEE";



let kwh=(

power*

5

/

3600000

).toFixed(

5

);



let cost=

Math.round(

kwh*

91

);



let status=

power>

4000

?

"WARNING"

:

"ACTIVE";




await supabaseClient

.from(

"telemetry"

)

.insert([{


sensor_id:

sensor,


site_id:

site,


voltage:


Number(

voltage

.toFixed(

2

)

),


current:


Number(

current

.toFixed(

2

)

),


power_w:

power,


kwh_total:

kwh,


source:


source,


temperature:


Math.round(

temp

),


status:


status,


battery_percent:


Math.round(

battery

),


pf:


Number(

pf

.toFixed(

2

)

),


ap:


ap,


freq:


Number(

freq

.toFixed(

2

)

),


sbee_ok:


sbee_ok,


cost_fcfa:


cost

}]);


if(

voltage<200

){

createAlert(

sensor,

site,

"LOW_VOLTAGE",

"Tension basse",

voltage,

200

);

}



if(

power>

4000

){

createAlert(

sensor,

site,

"OVERLOAD",

"Surconsommation",

power,

4000

);

}



if(

source==="GROUPE"

){

createAlert(

sensor,

site,

"SBEE_OUTAGE",

"Coupure SBEE",

0,

1

);

}




document

.getElementById(

"voltage"

)

.innerHTML=

Math.round(

voltage

)

+

"V";




document

.getElementById(

"power"

)

.innerHTML=

power+

"W";




document

.getElementById(

"temp"

)

.innerHTML=

Math.round(

temp

)

+

"°C";




document

.getElementById(

"source"

)

.innerHTML=

source;




document

.getElementById(

"cost"

)

.innerHTML=

cost+

"F";




document

.getElementById(

"pf"

)

.innerHTML=

pf.toFixed(

2

);




document

.getElementById(

"log"

)

.innerHTML=


`

✅

${new Date()

.toLocaleTimeString()}

→

${power}W

|

${voltage.toFixed(0)}V

|

${source}

<br>

`

+

document

.getElementById(

"log"

)

.innerHTML;



},

5000

);


}




async function stopSimulation(){


clearInterval(

interval

);


running=false;



let sensor=

document

.getElementById(

"sensorSelector"

)

.value;



await supabaseClient

.from(

"sensors"

)

.update({

status:

"OFFLINE"

})

.eq(

"id",

sensor);



}



loadSites();


</script>


</body>

</html>
