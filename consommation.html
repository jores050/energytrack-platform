<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Consommation - EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
Energy<span>Track</span>
</div>

<a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
<a class="nav-item active" href="consommation.html">⚡ Consommation</a>
<a class="nav-item" href="alertes.html">🔔 Alertes</a>

<a class="nav-item" href="sites.html">🏢 Multi-sites</a>
<a class="nav-item" href="capteurs.html">📡 Capteurs IoT</a>
<a class="nav-item" href="ia.html">🤖 Analyse IA</a>

</div>

<div class="main">

<h1>
Consommation énergétique
</h1>

<div class="section">

<canvas id="consumptionChart"></canvas>

</div>

</div>

<script>

let chart;

function initChart(){

const ctx =
document.getElementById('consumptionChart');

chart =
new Chart(ctx,{

type:'bar',

data:{

labels:[],

datasets:[{

label:'Puissance W',

data:[],

backgroundColor:'#00c896'

}]

},

options:{

responsive:true

}

});

}

async function loadConsumption(){

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return;

}

const userId =
userData.user.id;

const { data } =
await supabaseClient

.from('telemetry')

.select('*')

.eq('sensor_id',userId)

.order('created_at',{ascending:false})

.limit(20);

chart.data.labels=[];

chart.data.datasets[0].data=[];

data.reverse().forEach(item=>{

chart.data.labels.push(

new Date(item.created_at)
.toLocaleTimeString()

);

chart.data.datasets[0].data.push(

item.power_w

);

});

chart.update();

}

initChart();

loadConsumption();

supabaseClient

.channel('consumption-live')

.on(

'postgres_changes',

{

event:'INSERT',

schema:'public',

table:'telemetry'

},

()=>{

loadConsumption();

}

)

.subscribe();

</script>

</body>
</html>
