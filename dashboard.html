<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard EnergyTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* =====================================================================
   VARIABLES & RESET
   ===================================================================== */
:root {
  --bg:          #080d14;
  --bg-card:     #0d1520;
  --bg-deep:     #060b10;
  --bg-panel:    #111b28;
  --border:      rgba(255,255,255,0.06);
  --border-glow: rgba(0, 220, 160, 0.2);

  --green:       #00dca0;
  --green-dim:   rgba(0, 220, 160, 0.12);
  --green-glow:  rgba(0, 220, 160, 0.25);
  --amber:       #f5a623;
  --amber-dim:   rgba(245, 166, 35, 0.12);
  --red:         #ff3e5e;
  --red-dim:     rgba(255, 62, 94, 0.12);
  --blue:        #3b82f6;
  --blue-dim:    rgba(59, 130, 246, 0.12);
  --purple:      #a855f7;
  --purple-dim:  rgba(168, 85, 247, 0.12);

  --text:        #e2e8f0;
  --text-muted:  #64748b;
  --text-dim:    #94a3b8;

  --font-display: 'Orbitron', monospace;
  --font-body:    'Syne', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  --radius:      20px;
  --radius-sm:   12px;
  --sidebar-w:   240px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* =====================================================================
   ÉCRAN DE CHARGEMENT GLOBAL
   ===================================================================== */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  gap: 20px;
  transition: opacity 0.4s;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }
.loader-logo {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--green);
  letter-spacing: 3px;
}
.loader-bar {
  width: 200px; height: 2px;
  background: rgba(255,255,255,0.06);
  border-radius: 999px;
  overflow: hidden;
}
.loader-fill {
  height: 100%;
  background: var(--green);
  border-radius: 999px;
  width: 0%;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px var(--green-glow);
}
.loader-msg { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

/* =====================================================================
   ÉCRAN D'ERREUR / AUTH
   ===================================================================== */
#error-screen {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  align-items: center; justify-content: center;
  z-index: 9998;
  flex-direction: column;
  gap: 16px;
  padding: 32px;
  text-align: center;
}
#error-screen.visible { display: flex; }
.error-icon { font-size: 48px; }
.error-title { font-family: var(--font-display); font-size: 18px; color: var(--red); letter-spacing: 1px; }
.error-msg   { font-size: 13px; color: var(--text-muted); max-width: 400px; line-height: 1.7; }
.error-btn   {
  padding: 12px 28px; border-radius: var(--radius-sm);
  background: var(--green); color: #000;
  font-family: var(--font-body); font-weight: 700;
  font-size: 13px; cursor: pointer; border: none;
}

/* =====================================================================
   LAYOUT
   ===================================================================== */
.app-shell { display: flex; min-height: 100vh; }

/* =====================================================================
   SIDEBAR
   ===================================================================== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-deep);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 28px 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}
.logo {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 700;
  color: var(--green);
  letter-spacing: 2px;
  padding: 0 24px 28px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}
.logo span { color: var(--text-muted); font-weight: 400; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 24px;
  font-size: 13px; font-weight: 500;
  color: var(--text-muted);
  text-decoration: none;
  border-left: 3px solid transparent;
  transition: all 0.2s; letter-spacing: 0.3px;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.nav-item.active { color: var(--green); border-left-color: var(--green); background: var(--green-dim); }
.nav-item .nav-icon { font-size: 15px; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--amber-dim); color: var(--amber);
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
  font-family: var(--font-mono);
}
.sidebar-footer { margin-top: auto; padding: 16px 24px 0; border-top: 1px solid var(--border); }

/* Infos utilisateur sidebar */
.user-info {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
}
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--green-dim);
  border: 1px solid rgba(0,220,160,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--green);
  flex-shrink: 0;
}
.user-name  { font-size: 12px; font-weight: 600; color: var(--text); }
.user-email { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
.plan-badge {
  background: var(--amber-dim);
  border: 1px solid rgba(245,166,35,0.2);
  padding: 8px 14px; border-radius: var(--radius-sm);
  font-size: 11px; font-weight: 600;
  color: var(--amber); font-family: var(--font-display);
  letter-spacing: 1px;
}
.plan-badge.trial { background: var(--purple-dim); border-color: rgba(168,85,247,0.2); color: var(--purple); }
.plan-badge.expired { background: var(--red-dim); border-color: rgba(255,62,94,0.2); color: var(--red); }

/* =====================================================================
   MAIN
   ===================================================================== */
.main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 36px; max-width: calc(100vw - var(--sidebar-w)); }

/* =====================================================================
   TOP BAR
   ===================================================================== */
.topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; gap: 20px; flex-wrap: wrap; }
.topbar-title h1 { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 1px; }
.topbar-title p  { margin-top: 8px; color: var(--text-muted); font-size: 13px; display: flex; align-items: center; gap: 8px; }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); display: inline-block;
  animation: pulse-dot 1.6s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:0.4; transform:scale(1); }
  50%      { opacity:1;   transform:scale(1.15); box-shadow: 0 0 6px var(--green); }
}
.topbar-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn { padding: 10px 18px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-body); transition: all 0.2s; letter-spacing: 0.3px; }
.btn-primary { background: var(--green); color: #000; }
.btn-primary:hover { background: #00f5b0; box-shadow: 0 0 20px var(--green-glow); }
.btn-ghost  { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-ghost:hover { border-color: var(--green); color: var(--green); }
.btn-danger { background: transparent; border: 1px solid rgba(255,62,94,0.3); color: var(--red); }
.btn-danger:hover { background: var(--red-dim); }

/* =====================================================================
   BANNIÈRE PLAN / ÉTAT ABONNEMENT
   ===================================================================== */
.plan-banner {
  background: linear-gradient(135deg, rgba(245,166,35,0.08), rgba(13,21,32,0.6));
  border: 1px solid rgba(245,166,35,0.25);
  border-radius: var(--radius);
  padding: 18px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; margin-bottom: 28px; flex-wrap: wrap;
}
.plan-banner.trial-banner { border-color: rgba(168,85,247,0.25); background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(13,21,32,0.6)); }
.plan-banner.expired-banner { border-color: rgba(255,62,94,0.3); background: linear-gradient(135deg, rgba(255,62,94,0.06), rgba(13,21,32,0.6)); }
.plan-banner-text { font-size: 13px; color: var(--text-dim); }
.plan-banner-text strong { color: var(--amber); }

/* =====================================================================
   MESSAGE D'ÉTAT (aucun capteur, livraison en attente, etc.)
   ===================================================================== */
.state-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 48px 32px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.state-card-icon  { font-size: 48px; }
.state-card-title { font-family: var(--font-display); font-size: 16px; color: var(--text); letter-spacing: 1px; }
.state-card-desc  { font-size: 13px; color: var(--text-muted); max-width: 480px; line-height: 1.7; }
.state-card-step  { display: flex; gap: 12px; align-items: flex-start; text-align: left; background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 18px; width: 100%; max-width: 440px; }
.step-num  { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--green); flex-shrink: 0; }
.step-text { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

/* =====================================================================
   SITE GRID & CARDS
   ===================================================================== */
.site-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 28px; }
.site-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; animation: card-in 0.4s ease both; transition: border-color 0.3s; }
.site-card:hover { border-color: var(--border-glow); }
@keyframes card-in { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; gap: 12px; }
.card-title    { font-size: 15px; font-weight: 700; color: var(--text); }
.card-subtitle { margin-top: 4px; font-size: 12px; color: var(--text-muted); }

.status-badge {
  padding: 6px 14px; border-radius: 999px;
  font-size: 11px; font-weight: 700;
  font-family: var(--font-display); letter-spacing: 0.8px;
  white-space: nowrap; transition: all 0.4s;
}
.status-green  { background: var(--green-dim);  color: var(--green); border: 1px solid rgba(0,220,160,0.2); }
.status-orange { background: var(--amber-dim);  color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
.status-red    { background: var(--red-dim);    color: var(--red);   border: 1px solid rgba(255,62,94,0.2); }

/* Barre santé */
.health-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 12px; color: var(--text-muted); }
.health-bar-track { flex:1; height:4px; background:rgba(255,255,255,0.06); border-radius:999px; overflow:hidden; }
.health-bar-fill  { height:100%; border-radius:999px; transition: width 0.6s ease, background 0.4s; }

/* Paramètres électriques */
.elec-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 12px; }
.elec-box  { background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 13px 10px; text-align: center; }
.elec-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; }
.elec-value { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin-top: 6px; transition: color 0.4s; }
.elec-unit  { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* KPI grid */
.metrics-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 12px; }
.metric-box { background: var(--bg-deep); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; transition: border-color 0.3s; }
.metric-box.accent-green { border-color: rgba(0,220,160,0.15); }
.metric-box.accent-amber { border-color: rgba(245,166,35,0.15); }
.metric-box.accent-red   { border-color: rgba(255,62,94,0.15); }
.metric-box.span-full    { grid-column: 1 / -1; }
.metric-label { font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; }
.metric-value { font-family: var(--font-mono); font-size: 22px; font-weight: 500; color: var(--text); line-height: 1; transition: color 0.4s; }
.metric-value.large { font-size: 28px; }
.metric-sub   { margin-top: 6px; font-size: 11px; color: var(--text-muted); }

/* Chronomètre coupure */
.outage-timer { background: var(--red-dim); border: 1px solid rgba(255,62,94,0.25); border-radius: var(--radius-sm); padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 12px; display: none; }
.outage-timer.visible { display: flex; }
.outage-time-display  { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--red); font-variant-numeric: tabular-nums; }
.outage-cost-live     { font-family: var(--font-mono); font-size: 12px; color: var(--amber); }

/* Section analyse */
.analysis-section { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; }
.analysis-title   { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
.data-row         { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.data-row:last-child { border-bottom: none; padding-bottom: 0; }
.data-row-label   { color: var(--text-dim); }
.data-row-value   { font-family: var(--font-mono); font-size: 12px; }

/* SBEE vs Groupe */
.cost-split-bar { height: 8px; border-radius: 999px; background: var(--bg-deep); overflow: hidden; display: flex; margin: 8px 0; }
.cost-split-sbee   { background: var(--green); transition: width 0.6s ease; }
.cost-split-groupe { background: var(--amber); transition: width 0.6s ease; }
.cost-split-legend { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted); }
.legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

/* Économie */
.savings-box {
  background: linear-gradient(135deg, rgba(0,220,160,0.06), rgba(13,21,32,0.6));
  border: 1px solid rgba(0,220,160,0.15);
  border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.savings-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.savings-value { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--green); }
.savings-note  { font-size: 10px; color: var(--text-muted); }

/* IoT chips */
.iot-status-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
.iot-chip { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); }
.iot-chip-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Buffer */
.buffer-row   { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
.buffer-track { flex:1; height:3px; background: var(--border); border-radius:999px; overflow:hidden; }
.buffer-fill  { height:100%; background: var(--blue); border-radius:999px; transition: width 0.6s; }

/* Alertes */
.alert-item  { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.alert-item:last-child { border-bottom: none; }
.alert-icon    { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.alert-content { flex: 1; }
.alert-label   { font-weight: 600; color: var(--text); }
.alert-meta    { color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); font-size: 11px; }
.alert-ack-btn { font-size: 10px; padding: 4px 10px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); border-radius: 6px; cursor: pointer; font-family: var(--font-body); white-space: nowrap; }
.alert-ack-btn:hover { border-color: var(--green); color: var(--green); }

/* Chart controls */
.chart-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
.chart-label { font-size: 11px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; }
.period-tabs { display: flex; gap: 4px; }
.period-tab  { padding: 5px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: var(--font-body); transition: all 0.2s; }
.period-tab.active { background: var(--green-dim); border-color: var(--border-glow); color: var(--green); }
.sensor-select { background: var(--bg-deep); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 12px; font-family: var(--font-body); font-size: 12px; outline: none; cursor: pointer; transition: border-color 0.2s; }
.sensor-select:focus { border-color: var(--green); }

/* Premium lock */
.premium-lock { background: rgba(245,166,35,0.04); border: 1px dashed rgba(245,166,35,0.2); border-radius: var(--radius-sm); padding: 16px; text-align: center; }
.premium-lock-title { font-size: 12px; color: var(--amber); font-weight: 700; margin-bottom: 6px; }
.premium-lock-desc  { font-size: 11px; color: var(--text-muted); }

/* WhatsApp btn */
.whatsapp-btn { width:100%; padding:11px; background:rgba(37,211,102,0.08); border:1px solid rgba(37,211,102,0.2); border-radius:var(--radius-sm); color:#25D366; font-size:12px; font-weight:700; cursor:pointer; font-family:var(--font-body); transition:all 0.2s; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
.whatsapp-btn:hover { background:rgba(37,211,102,0.14); box-shadow:0 0 15px rgba(37,211,102,0.15); }

/* Skeleton */
.skeleton { background: linear-gradient(90deg,#0d1520 25%,#111b28 50%,#0d1520 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:6px; }
@keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

/* =====================================================================
   RESPONSIVE
   ===================================================================== */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 20px; max-width: 100vw; }
  .site-grid { grid-template-columns: 1fr; }
  .elec-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- ================================================================
     LOADING SCREEN
     ================================================================ -->
<div id="loading-screen">
  <div class="loader-logo">Energy<span style="color:var(--text-muted);font-weight:400;">Track</span></div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="loader-msg" id="loader-msg">Connexion…</div>
</div>

<!-- ================================================================
     ERROR SCREEN
     ================================================================ -->
<div id="error-screen">
  <div class="error-icon" id="error-icon">⚠️</div>
  <div class="error-title" id="error-title">Accès refusé</div>
  <div class="error-msg"   id="error-msg">Une erreur est survenue.</div>
  <button class="error-btn" id="error-btn" onclick="window.location.href='auth.html'">Se connecter</button>
</div>

<!-- ================================================================
     APP SHELL
     ================================================================ -->
<div class="app-shell" id="app-shell" style="display:none;">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Energy<span>Track</span></div>

    <a class="nav-item active" href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard</a>
    <a class="nav-item"        href="consommation.html"><span class="nav-icon">⚡</span> Consommation</a>
    <a class="nav-item"        href="alertes.html">
      <span class="nav-icon">🔔</span> Alertes
      <span class="nav-badge" id="sidebar-alert-count"></span>
    </a>
    <a class="nav-item"        href="rapports.html"><span class="nav-icon">📊</span> Rapports</a>
    <a class="nav-item"        href="sites.html"><span class="nav-icon">🏢</span> Multi-sites</a>
    <a class="nav-item"        href="capteurs.html"><span class="nav-icon">📡</span> Capteurs IoT</a>
    <a class="nav-item"        href="ia.html"><span class="nav-icon">🤖</span> Analyse IA</a>
    <a class="nav-item"        href="parametres.html"><span class="nav-icon">⚙️</span> Paramètres</a>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sb-avatar">—</div>
        <div>
          <div class="user-name"  id="sb-name">—</div>
          <div class="user-email" id="sb-email">—</div>

/* ─────────────────────────────────────────────────────────────────

/* ─────────────────────────────────────────────────────────────────

function setLoader(msg, pct) {
  document.getElementById('loader-msg').textContent  = msg;
  document.getElementById('loader-fill').style.width = pct + '%';
}
function hideLoader() {
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hidden');
  setTimeout(() => ls.style.display = 'none', 400);
}
function showError(icon, title, msg, btnLabel = 'Se connecter', href = 'auth.html') {
  document.getElementById('error-icon').textContent  = icon;
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').textContent   = msg;
  const btn = document.getElementById('error-btn');

  document.getElementById('error-screen').classList.add('visible');

/* ─────────────────────────────────────────────────────────────────
   UTILITAIRES
   ─────────────────────────────────────────────────────────────────*/
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u202f') + ' F';
}
function fmtKwh(kwh) {
  if (kwh === null || kwh === undefined) return '—';
  return parseFloat(kwh) < 1 ? `${Math.round(kwh*1000)} Wh` : `${parseFloat(kwh).toFixed(2)} kWh`;
}
function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
}
function setText(id, v) {
  const el = document.getElementById(id);
  if (el && el.textContent !== String(v)) el.textContent = v;
}
function resolveStatus(latest) {
  if (!latest) return { text: 'HORS LIGNE', cls: 'status-red' };
  const v = parseFloat(latest.voltage);
  if (v < 50) return { text: 'COUPURE SBEE', cls: 'status-red' };
  if (latest.source === 'GROUPE') return { text: 'GROUPE ACTIF', cls: 'status-orange' };
  return { text: 'SBEE OK', cls: 'status-green' };
}
function initials(email) {
  if (!email) return '?';
  return email[0].toUpperCase();
}

/* ─────────────────────────────────────────────────────────────────
   INIT — POINT D'ENTRÉE
   ─────────────────────────────────────────────────────────────────*/
async function init() {
  setLoader('Vérification de session…', 10);

  /* 1. Auth */
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    showError('🔐', 'Non authentifié', 'Vous devez être connecté pour accéder au dashboard. Veuillez vous identifier.');
    return;
  }
  currentUser = session.user;
  setLoader('Chargement du profil…', 25);

  /* 2. Profil */
  const { data: profile } = await sb
    .from('profiles')
    .select('*')
    .eq('id', currentUser.id)
    .maybeSingle();
  userProfile = profile;

  /* 3. Tarif personnalisé */
  const { data: settings } = await sb
    .from('settings')
    .select('tariff')
    .eq('user_id', currentUser.id)
    .maybeSingle();
  if (settings?.tariff) userTariff = parseFloat(settings.tariff);

  setLoader('Vérification de l\'abonnement…', 45);

  /* 4. Abonnement */
  await loadSubscription();
  setLoader('Chargement des données…', 65);

  /* 5. Parcours utilisateur : vérifier état du compte */
  const step = getUserStep();
  if (step !== 'dashboard') {
    renderOnboardingState(step);
    renderSidebar();
    document.getElementById('app-shell').style.display = 'flex';
    hideLoader();
    return;
  }

  /* 6. Charger le dashboard */
  await loadDashboard();
  setLoader('Presque prêt…', 90);

  /* 7. Realtime */
  startRealtime();

  renderSidebar();
  document.getElementById('app-shell').style.display = 'flex';
  hideLoader();

  /* Rafraîchissement toutes les 60s */
  setInterval(loadDashboard, 60000);
}

/* ─────────────────────────────────────────────────────────────────
   ABONNEMENT & PLAN
   ─────────────────────────────────────────────────────────────────*/
async function loadSubscription() {
  const { data: sub } = await sb
    .from('subscriptions')
    .select('*')
    .eq('user_id', currentUser.id)
    .maybeSingle();
  userSub = sub;

  if (sub?.plan_id) {
    const { data: plan } = await sb
      .from('plans')
      .select('*')
      .eq('id', sub.plan_id)
      .maybeSingle();
    currentPlan = plan;
    if (plan?.features) {
      canAI          = plan.features.ai          === true;
      canPDF         = plan.features.pdf         === true;
      canMultiSite   = plan.features.multisite   === true;
      canMultiSensor = plan.features.multisensor === true;
    }
  }
}

function subIsActive() {
  if (!userSub) return false;
  if (userSub.status !== 'active') return false;
  if (userSub.expires_at && new Date(userSub.expires_at) < new Date()) return false;
  return true;
}
function subIsTrial() { return userSub?.trial === true; }

/* ─────────────────────────────────────────────────────────────────
   PARCOURS UTILISATEUR (miroir de auth.js)
   ─────────────────────────────────────────────────────────────────*/
function getUserStep() {
  if (!userProfile) return 'no-profile';
  if (userProfile.sensor_configured)           return 'dashboard';
  if (userProfile.delivery_status === 'delivered') return 'setup';
  if (userProfile.payment_status  === 'paid')      return 'delivery';
  if (userProfile.selected_sensor)                 return 'payment';
  return 'no-sensor';
}

/* ─────────────────────────────────────────────────────────────────
   SIDEBAR
   ─────────────────────────────────────────────────────────────────*/
function renderSidebar() {
  const email = currentUser.email || '';
  const company = userProfile?.company || '';
  const displayName = company || email.split('@')[0];

  document.getElementById('sb-avatar').textContent = initials(email);
  document.getElementById('sb-name').textContent   = displayName;
  document.getElementById('sb-email').textContent  = email;

  const badge = document.getElementById('sb-plan-badge');
  if (!userSub) {
    badge.textContent = 'AUCUN PLAN';
    badge.className   = 'plan-badge expired';
  } else if (!subIsActive()) {
    badge.textContent = 'EXPIRÉ';
    badge.className   = 'plan-badge expired';
  } else if (subIsTrial()) {
    badge.textContent = currentPlan?.name?.toUpperCase() || 'ESSAI';
    badge.className   = 'plan-badge trial';
  } else {
    badge.textContent = currentPlan?.name?.toUpperCase() || userSub.plan?.toUpperCase() || 'ACTIF';
    badge.className   = 'plan-badge';

}

async function loadDashboard() {
  renderPlanBanner();

  /* Sites de l'utilisateur */
  const { data: allSites, error: sitesErr } = await sb
    .from('sites')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at');

  if (sitesErr || !allSites?.length) {
    renderOnboardingState('no-sensor');
    return;
  }

  /* Restriction multi-site */
  const sites = canMultiSite ? allSites : allSites.slice(0, 1);

  const container = document.getElementById('main-content');
  if (!container.querySelector('.site-grid')) {
    container.innerHTML = `<div class="site-grid" id="sitesContainer"></div>`;
  }

  for (const site of sites) {
    await loadSite(site);
  }

  /* Badge alertes sidebar */
  const { count: alertCount } = await sb
    .from('alerts')
    .select('id', { count: 'exact', head: true })
    .in('site_id', sites.map(s => s.id))
    .eq('status', 'ACTIVE');
  setText('sidebar-alert-count', alertCount > 0 ? alertCount : '');

/* ─────────────────────────────────────────────────────────────────
   CHARGEMENT D'UN SITE
   ─────────────────────────────────────────────────────────────────*/
async function loadSite(site) {
  const sid = site.id;

  /* Capteurs du site */
  const { data: allSensors } = await sb
    .from('sensors')
    .select('*')
    .eq('site_id', sid)
    .eq('status', 'ACTIVE');
  const sensors = canMultiSensor
    ? (allSensors || [])
    : (allSensors || []).slice(0, 1);

  /* Télémétrie (24 dernières mesures par capteur) */
  const sensorIds = sensors.map(s => s.id);
  let telemetry = [];
  if (sensorIds.length) {
    const { data: tele } = await sb
      .from('telemetry')
      .select('*, sensors(name)')
      .in('sensor_id', sensorIds)
      .order('created_at', { ascending: false })
      .limit(24 * sensorIds.length);
    telemetry = tele || [];
  }
  cachedTelemetry[sid] = telemetry;

  /* Alertes actives */
  const { data: alerts } = await sb
    .from('alerts')
    .select('*, sensors(name)')
    .eq('site_id', sid)
    .eq('status', 'ACTIVE')
    .order('created_at', { ascending: false })
    .limit(10);

  /* Rendu HTML (1 seule fois) */
  const grid = document.getElementById('sitesContainer');
  if (grid && !renderedSites.has(sid)) {
    grid.innerHTML += buildSiteCardHTML(site, sensors);
    renderedSites.add(sid);
    setTimeout(() => updateSiteCard(site, sensors, telemetry, alerts || []), 60);
  } else {
    updateSiteCard(site, sensors, telemetry, alerts || []);
  }
}

    <div class="data-row"><span class="data-row-label">Dernière coupure SBEE</span><span class="data-row-value" id="last-cut-${sid}" style="color:var(--red);">—</span></div>
    <div class="data-row"><span class="data-row-label">Coupures détectées (historique)</span><span class="data-row-value" id="outage-count-${sid}">—</span></div>
    <div class="data-row"><span class="data-row-label">Tarif appliqué SBEE</span><span class="data-row-value" id="tariff-${sid}">${userTariff} FCFA/kWh</span></div>
  </div>

  <div class="analysis-section">
    <div class="analysis-title">🔌 Statut capteurs IoT</div>
    <div class="iot-status-row" id="iot-chips-${sid}"></div>
    <div class="buffer-row">
      <span>Buffer SD offline (72h)</span>
      <div class="buffer-track"><div class="buffer-fill" id="buffer-fill-${sid}" style="width:4%"></div></div>
      <span id="buffer-val-${sid}">~4h</span>
    </div>
  </div>

  <div class="analysis-section" style="border-color:rgba(255,62,94,0.12);">
    <div class="analysis-title" style="color:var(--red);">🔔 Diagnostics & Alertes</div>
    <div id="alerts-list-${sid}"></div>
  </div>

  <div style="margin-top:20px;">
    <div class="chart-controls">
      <div class="chart-label">Analyse graphique</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <div class="period-tabs">
          <button class="period-tab active" onclick="setPeriod('${sid}','24h',this)">24h</button>
          <button class="period-tab" onclick="setPeriod('${sid}','7d',this)">7j</button>
          <button class="period-tab" onclick="setPeriod('${sid}','30d',this)">30j</button>
        </div>
        <select class="sensor-select" id="select-chart-${sid}" onchange="triggerChartFilter('${sid}')">
          <option value="ALL">Tous capteurs combinés</option>
          ${opts}
        </select>
      </div>
    </div>
    <canvas id="chart-${sid}" style="max-height:200px;"></canvas>
  </div>

  <button class="whatsapp-btn" onclick="triggerWeeklyReport('${sid}')">
    📲 Envoyer rapport WhatsApp maintenant
  </button>

  <div style="margin-top:12px;">${aiBlock}</div>
</div>`;
}

/* ─────────────────────────────────────────────────────────────────
   MISE À JOUR IN-PLACE D'UNE CARTE
   ─────────────────────────────────────────────────────────────────*/
function updateSiteCard(site, sensors, telemetry, activeAlerts) {
  const sid = site.id;
  const sorted = [...telemetry].sort((a,b) => new Date(b.created_at)-new Date(a.created_at));
  const latest = sorted[0] || null;

  /* Statut */
  const { text: statusText, cls } = resolveStatus(latest);
  const badge = document.getElementById(`status-badge-${sid}`);
  if (badge) { badge.textContent = statusText; badge.className = `status-badge ${cls}`; }

  /* Chronomètre coupure */
  const timerEl = document.getElementById(`outage-timer-${sid}`);
  if (timerEl) {
    const isOutage = latest && parseFloat(latest.voltage) < 50;
    timerEl.classList.toggle('visible', isOutage);
    if (isOutage && !outageTickers[sid]) {
      const t0 = new Date(latest.created_at).getTime();
      outageTickers[sid] = setInterval(() => {
        const el = Math.floor((Date.now()-t0)/1000);
        const h = String(Math.floor(el/3600)).padStart(2,'0');
        const m = String(Math.floor((el%3600)/60)).padStart(2,'0');
        const s = String(el%60).padStart(2,'0');
        setText(`outage-time-${sid}`, `${h}:${m}:${s}`);
        const kwh = (el/3600) * ((parseFloat(latest.power_w)||2000)/1000);
        setText(`outage-cost-${sid}`, `Coût groupe estimé : ${fmt(kwh * 350)}`);
      }, 1000);
    } else if (!isOutage && outageTickers[sid]) {
      clearInterval(outageTickers[sid]);
      delete outageTickers[sid];
    }
  }

  /* Paramètres électriques */
  if (latest) {
    const vEl = document.getElementById(`elec-v-${sid}`);
    if (vEl) {
      const v = parseFloat(latest.voltage);
      vEl.textContent = isNaN(v) ? '—' : v.toFixed(1);
      vEl.style.color = (v<190||v>250) ? 'var(--red)' : 'var(--blue)';
    }
    const iEl = document.getElementById(`elec-i-${sid}`);
    if (iEl) iEl.textContent = latest.current ? parseFloat(latest.current).toFixed(2) : '—';

    const srcEl = document.getElementById(`elec-src-${sid}`);
    if (srcEl) {
      srcEl.textContent = latest.source || 'SBEE';
      srcEl.style.color = latest.source === 'GROUPE' ? 'var(--amber)' : 'var(--green)';
    }
    const tempEl = document.getElementById(`elec-temp-${sid}`);
    if (tempEl) {
      const t = parseFloat(latest.temperature);
      tempEl.textContent = isNaN(t) ? '—' : t.toFixed(1);
      tempEl.style.color = t > 45 ? 'var(--red)' : t > 35 ? 'var(--amber)' : 'var(--purple)';
    }
  }

  /* Santé capteurs */
  const online = sensors.filter(s => s.status === 'ACTIVE').length;
  const total  = sensors.length;
  const hPct   = total > 0 ? Math.round((online/total)*100) : 0;
  const hColor = hPct>=70?'var(--green)':hPct>=40?'var(--amber)':'var(--red)';
  setText(`health-label-${sid}`, `Santé ${online}/${total} capteurs`);
  setText(`health-pct-${sid}`, `${hPct}%`);
  const fillEl = document.getElementById(`health-fill-${sid}`);
  if (fillEl) { fillEl.style.width = `${hPct}%`; fillEl.style.background = hColor; }

  /* KPI puissance */
  const power = latest ? Math.round(parseFloat(latest.power_w)||0) : 0;
  setText(`kpi-power-${sid}`, `${power} W`);
  const batt = latest?.battery_percent;
  setText(`kpi-battery-${sid}`, batt !== null && batt !== undefined ? `Batterie : ${Math.round(batt)}%` : 'Alimentation directe');

  /* KPI énergie & coût — on prend la dernière valeur kWh_total par capteur */
  let totalKwh = 0, totalKwhSbee = 0, totalKwhGroupe = 0;
  const byCaptor = {};
  sorted.forEach(item => {
    const sId = item.sensor_id;
    if (!byCaptor[sId] || new Date(item.created_at) > new Date(byCaptor[sId].created_at)) {
      byCaptor[sId] = item;
    }
    // Répartition par source
    if (item.source === 'GROUPE') totalKwhGroupe = Math.max(totalKwhGroupe, parseFloat(item.kwh_total)||0);
    else totalKwhSbee = Math.max(totalKwhSbee, parseFloat(item.kwh_total)||0);
  });
  Object.values(byCaptor).forEach(r => { totalKwh += parseFloat(r.kwh_total)||0; });

  const costSbee   = Math.round(totalKwhSbee   * userTariff);
  const costGroupe = Math.round(totalKwhGroupe * 350); // tarif groupe fixe
  const costTotal  = costSbee + costGroupe;

  setText(`kpi-energy-${sid}`, fmtKwh(totalKwh));
  setText(`kpi-cost-${sid}`,   fmt(costTotal));
  setText(`kpi-kwh-${sid}`,    `${totalKwh.toFixed(2)} kWh cumulés`);
  setText(`kpi-alerts-${sid}`, activeAlerts.length);

  /* Top capteur */
  const topSorted = sorted.slice().sort((a,b)=>(parseFloat(b.power_w)||0)-(parseFloat(a.power_w)||0));
  const top = topSorted[0];
  setText(`kpi-top-name-${sid}`,  top?.sensors?.name || sensors[0]?.name || '—');
  setText(`kpi-top-power-${sid}`, `${Math.round(parseFloat(top?.power_w)||0)} W`);

  /* Répartition */
  const sbeePct = totalKwh>0 ? Math.round((totalKwhSbee/totalKwh)*100) : 100;
  const grpPct  = 100 - sbeePct;
  setText(`sbee-pct-${sid}`,    sbeePct);
  setText(`groupe-pct-${sid}`,  grpPct);
  const sbeeBar = document.getElementById(`sbee-bar-${sid}`);
  const grpBar  = document.getElementById(`groupe-bar-${sid}`);
  if (sbeeBar) sbeeBar.style.width = `${sbeePct}%`;
  if (grpBar)  grpBar.style.width  = `${grpPct}%`;
  setText(`sbee-kwh-${sid}`,  totalKwhSbee.toFixed(2));
  setText(`sbee-cost-${sid}`, fmt(costSbee));
  setText(`grp-kwh-${sid}`,   totalKwhGroupe.toFixed(2));
  setText(`grp-cost-${sid}`,  fmt(costGroupe));

  const surcharge = Math.round(totalKwhGroupe * (350 - userTariff));
  setText(`groupe-premium-${sid}`, surcharge>0 ? `+${fmt(surcharge)}` : '0 F');

  /* Économie possible */
  const dayOfMonth  = new Date().getDate();
  const daysInMonth = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate();
  const projected   = dayOfMonth > 0 ? Math.round(surcharge * (daysInMonth/dayOfMonth)) : surcharge;
  setText(`savings-val-${sid}`, surcharge>0 ? fmt(projected) : '0 F');

  /* États réseau */
  setText(`last-emit-${sid}`,    latest ? fmtTime(latest.created_at) : '—');
  const outageRows = sorted.filter(t => parseFloat(t.voltage)<50);
  setText(`last-cut-${sid}`,    outageRows[0] ? fmtTime(outageRows[0].created_at) : 'Aucune coupure');
  setText(`outage-count-${sid}`, outageRows.length > 0 ? `${outageRows.length} relevé(s) hors tension` : '—');

  /* Chips IoT */
  const chipsEl = document.getElementById(`iot-chips-${sid}`);
  if (chipsEl) {
    chipsEl.innerHTML = sensors.length === 0
      ? '<span style="color:var(--text-muted);font-size:12px;">Aucun capteur actif</span>'
      : sensors.map(s => {
          const isOnline = s.status === 'ACTIVE';
          const dotColor = isOnline ? 'var(--green)' : 'var(--red)';
          const label = s.name || s.sensor_name || s.id.slice(0,8);
          const cls   = s.sensor_class || s.type || '';
          return `<div class="iot-chip">
            <span class="iot-chip-dot" style="background:${dotColor}"></span>
            <span>${label}</span>
            ${cls ? `<span style="color:var(--text-muted);">· ${cls}</span>` : ''}
          </div>`;
        }).join('');
  }

  /* Alertes */
  const alertsEl = document.getElementById(`alerts-list-${sid}`);
  if (alertsEl) {
    if (!activeAlerts.length) {
      alertsEl.innerHTML = `<div style="color:var(--green);font-size:12px;padding:6px 0;">✔ Aucun dysfonctionnement détecté</div>`;
    } else {
      const icons = { SBEE_OUTAGE:'🔴', HIGH_VOLTAGE:'⚠️', LOW_VOLTAGE:'🟡', OVERCONSUMPTION:'🔥', DEVICE_OFFLINE:'📵' };
      alertsEl.innerHTML = activeAlerts.map(alt => {
        const ico   = icons[alt.type] || '⚠️';
        const sName = alt.sensors?.name || 'Général';
        return `<div class="alert-item">
          <span class="alert-icon">${ico}</span>
          <div class="alert-content">
            <div class="alert-label">${sName} — ${alt.type}</div>
            <div class="alert-meta">${alt.message || ''} · ${fmtTime(alt.created_at)}</div>
          </div>
          <button class="alert-ack-btn" onclick="ackAlert('${alt.id}','${sid}')">Acquitter</button>
        </div>`;
      }).join('');
    }
  }

  /* IA */
  if (canAI) {
    const aiEl = document.getElementById(`ai-msg-${sid}`);
    if (aiEl) {
      const topName  = top?.sensors?.name || 'Tableau principal';
      aiEl.textContent = surcharge > 0
        ? `"${topName}" consomme ${Math.round(parseFloat(top?.power_w)||0)}W — source ${top?.source||'SBEE'}. Surcoût groupe ce mois : ${fmt(surcharge)}. Recommandation : arrêt groupe entre 22h–6h pour économiser ~${fmt(projected)} FCFA.`
        : `Aucun surcoût groupe détecté. Consommation totale ${fmtKwh(totalKwh)} à ${userTariff} FCFA/kWh = ${fmt(costTotal)} ce mois.`;
    }
  }

  /* Graphique */
  updateChart(sid, 'ALL');
}

/* ─────────────────────────────────────────────────────────────────
   GRAPHIQUES
   ─────────────────────────────────────────────────────────────────*/
function updateChart(siteId, targetSensorId) {
  const raw = cachedTelemetry[siteId] || [];
  const ctx = document.getElementById(`chart-${siteId}`);
  if (!ctx || !raw.length) return;

  let dataset = targetSensorId === 'ALL' ? raw : raw.filter(t => t.sensor_id === targetSensorId);
  const points = [...dataset]
    .sort((a,b) => new Date(a.created_at)-new Date(b.created_at))
    .slice(-24);

  const labels    = points.map(t => new Date(t.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));
  const powerData = points.map(t => Math.round(parseFloat(t.power_w)||0));
  const voltData  = points.map(t => Math.round(parseFloat(t.voltage)||0));

  if (charts[siteId]) {
    charts[siteId].data.labels = labels;
    charts[siteId].data.datasets[0].data = powerData;
    charts[siteId].data.datasets[1].data = voltData;
    charts[siteId].update('none');
  } else {
    charts[siteId] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'Puissance (W)', data:powerData, borderColor:'#00dca0', backgroundColor:'rgba(0,220,160,0.06)', fill:true, tension:0.35, pointRadius:2, yAxisID:'yPower' },
          { label:'Tension (V)',   data:voltData,  borderColor:'#3b82f6', backgroundColor:'transparent', fill:false, tension:0.35, pointRadius:2, borderDash:[4,4], yAxisID:'yVoltage' }
        ]
      },
      options: {
        responsive:true,
        interaction:{mode:'index',intersect:false},
        animation:{duration:400},
        plugins:{
          legend:{labels:{color:'#94a3b8',font:{family:'Syne',size:11},usePointStyle:true,pointStyleWidth:8}}
        },
        scales:{
          x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},
          yPower:{position:'left',ticks:{color:'#00dca0',font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},
          yVoltage:{position:'right',ticks:{color:'#3b82f6',font:{size:10}},grid:{display:false},min:150,max:260}
        }
      }
    });
  }
}

function triggerChartFilter(siteId) {
  const sel = document.getElementById(`select-chart-${siteId}`);
  if (sel) updateChart(siteId, sel.value);
}
function setPeriod(siteId, period, btn) {
  document.querySelectorAll(`#card-${siteId} .period-tab`).forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  // En prod: recharger selon période (limit différent, filtrage date)
  triggerChartFilter(siteId);
}

/* ─────────────────────────────────────────────────────────────────
   ACTIONS
   ─────────────────────────────────────────────────────────────────*/
async function ackAlert(alertId, siteId) {
  await sb.from('alerts').update({ status: 'RESOLVED' }).eq('id', alertId);
  // Recharger le site
  const { data: site } = await sb.from('sites').select('*').eq('id', siteId).single();
  if (site) await loadSite(site);
}

function triggerWeeklyReport(siteId) {
  alert('📲 Rapport WhatsApp envoyé !\n\n(En production, déclenche l\'Edge Function Supabase qui envoie le rapport via Twilio WhatsApp API au numéro associé au profil.)');
}

function exportPDF(siteId) {
  alert('📥 Export PDF en cours…\n\n(Fonctionnalité réservée aux plans avec PDF activé.)');
}

/* ─────────────────────────────────────────────────────────────────
   REALTIME SUPABASE
   ─────────────────────────────────────────────────────────────────*/
function startRealtime() {
  if (realtimeChannel) realtimeChannel.unsubscribe();
  realtimeChannel = sb.channel('dashboard-live')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'telemetry' }, scheduleReload)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'alerts' },    scheduleReload)
    .subscribe();
}
function scheduleReload() {
  clearTimeout(reloadTimeout);
  reloadTimeout = setTimeout(loadDashboard, 5000);
}

/* ─────────────────────────────────────────────────────────────────
   DÉCONNEXION
   ─────────────────────────────────────────────────────────────────*/
async function logout() {
  if (realtimeChannel) realtimeChannel.unsubscribe();
  Object.values(outageTickers).forEach(clearInterval);
  await sb.auth.signOut();
  localStorage.clear();
  window.location.href = 'auth.html';
}

/* ─────────────────────────────────────────────────────────────────
   DÉMARRAGE
   ─────────────────────────────────────────────────────────────────*/
init().catch(err => {
  console.error('Init error:', err);
  showError('💥', 'Erreur inattendue', `Une erreur technique est survenue : ${err.message}. Réessayez ou contactez le support.`, 'Réessayer', '');
  document.getElementById('error-btn').onclick = () => window.location.reload();
});
</script>
