<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
/* ===================================================================
   VARIABLES GLOBALES
   =================================================================== */
:root {
  --bg-deep:        #080f1c;
  --bg-card:        #0f1829;
  --bg-inset:       #0a1020;
  --accent-green:   #00d4a0;
  --accent-amber:   #f5a623;
  --accent-red:     #ff4d6a;
  --accent-blue:    #3b82f6;
  --text-primary:   #e8f0fe;
  --text-secondary: #7a8fac;
  --text-muted:     #3d5270;
  --border-subtle:  rgba(255,255,255,0.04);
  --border-accent:  rgba(0,212,160,0.18);
  --shadow-card:    0 8px 40px rgba(0,0,0,0.45);
  --radius-card:    24px;
  --radius-box:     14px;
  --radius-pill:    999px;
  --font-display:   'Orbitron', monospace;
  --font-body:      'DM Sans', sans-serif;
  --transition:     0.25s cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
}

/* ===================================================================
   GRILLE SITES
   =================================================================== */
.site-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
  gap: 28px;
  margin-top: 28px;
}

/* ===================================================================
   CARTE SITE
   =================================================================== */
.site-card {
  background: linear-gradient(160deg, #121e32 0%, #0c1522 100%);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-card);
  padding: 28px;
  box-shadow: var(--shadow-card);
  transition: transform var(--transition), box-shadow var(--transition);
  animation: cardIn 0.4s ease both;
}
.site-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.55);
}

/* ===================================================================
   EN-TÊTE + BADGE STATUS
   =================================================================== */
.site-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 20px;
}
.site-header h2 { font-size: 17px; font-weight: 600; letter-spacing: 0.2px; }
.site-city { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 13px;
  border-radius: var(--radius-pill);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  transition: background var(--transition), color var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.status-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  animation: pulse 1.6s ease infinite;
}
.badge-green  { background: rgba(0,212,160,0.12);  color: var(--accent-green); }
.badge-orange { background: rgba(245,166,35,0.12); color: var(--accent-amber); }
.badge-red    { background: rgba(255,77,106,0.12); color: var(--accent-red);   }

/* ===================================================================
   BARRE DISPONIBILITÉ
   =================================================================== */
.health-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  font-size: 12px;
  color: var(--text-secondary);
}
.health-track {
  flex: 1;
  height: 4px;
  background: var(--bg-inset);
  border-radius: 2px;
  overflow: hidden;
}
.health-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s ease, background 0.4s;
}

/* ===================================================================
   KPI GRIDS
   =================================================================== */
.kpi-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}
.kpi-box {
  background: var(--bg-inset);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-box);
  padding: 14px 15px;
  position: relative;
  overflow: hidden;
  transition: border-color var(--transition);
}
.kpi-box:hover { border-color: rgba(0,212,160,0.12); }
.kpi-box::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  border-radius: 2px 2px 0 0;
  background: transparent;
  transition: background var(--transition);
}
.kpi-box.kg::after  { background: var(--accent-green); }
.kpi-box.kb::after  { background: var(--accent-blue);  }
.kpi-box.kr::after  { background: var(--accent-red);   }
