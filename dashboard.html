<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyTrack - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #00c896; --warn: #ffb547; --danger: #ff4c61; }
        body { background: var(--bg); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0b1120; height: 100vh; padding: 25px; position: fixed; border-right: 1px solid rgba(255,255,255,0.05); }
        .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; color: #94a3b8; text-decoration: none; border-radius: 10px; margin-bottom: 5px; }
        .nav-item.active { background: rgba(0,200,150,0.1); color: var(--accent); }
        .nav-item.locked { opacity: 0.4; cursor: not-allowed; }
        .badge-pro { background: var(--warn); color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        /* Main Content */
        .main { margin-left: 280px; padding: 40px; width: 100%; }
        .upgrade-banner { background: linear-gradient(90deg, #ff4c61, #f43f5e); padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-pay { background: white; color: #f43f5e; padding: 8px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; }

        /* Site Cards */
        .site-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .status.ok { background: rgba(0,200,150,0.1); color: var(--accent); }
        .status.ko { background: rgba(255,76,97,0.1); color: var(--danger); }
        
        .locked-slot { border: 2px dashed rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; border-radius: 20px; color: #64748b; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-family: 'Orbitron'; font-size: 22px; margin-bottom: 40px;">Energy<span style="color:var(--accent)">Track</span></div>
    <nav>
        <a href="dashboard.html" class="nav-item active">🏠 Dashboard</a>
        <a href="consommation.html" class="nav-item">⚡ Consommation</a>
        <a href="ia.html" class="nav-item" data-premium="true">🤖 Analyse IA</a>
        <a href="rapports.html" class="nav-item" data-premium="true">📊 Rapports PDF</a>
        <a href="sites.html" class="nav-item" data-premium="true">🏢 Multi-sites</a>
    </nav>
</div>

<div class="main">
    <div id="alert-zone"></div>
    <h1 id="welcome-title">Chargement...</h1>

    <div class="site-grid" id="container"></div>
</div>

<script>
/** 1. LOGIQUE DE VÉRIFICATION AVANCÉE **/
async function checkSubscription() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return { isPremium: false, user: null };

    const { data: sub } = await supabaseClient
        .from('subscriptions')
        .select('status, plan, expires_at')
        .eq('user_id', user.id)
        .single();

    if (!sub) return { isPremium: false, user };

    const now = new Date();
    const expiry = new Date(sub.expires_at);
    
    // CONDITIONS : Actif ET pas Starter ET pas encore expiré
    const isPremium = (
        sub.status === 'active' && 
        sub.plan !== 'starter' && 
        expiry > now
    );

    return { isPremium, user, plan: sub.plan };
}

/** 2. AFFICHAGE DU DASHBOARD **/
async function load() {
    const { isPremium, user, plan } = await checkSubscription();
    if (!user) { window.location.href = 'auth.html'; return; }

    document.getElementById('welcome-title').innerText = `Dashboard (${plan || 'Starter'})`;

    // A. Blocage visuel du menu si non-premium
    if (!isPremium) {
        document.getElementById('alert-zone').innerHTML = `
            <div class="upgrade-banner">
                <div><strong>Abonnement limité</strong><br><small>Passez au plan Business pour débloquer le multi-sites et l'IA.</small></div>
                <a href="upgrade.html" class="btn-pay">Mettre à jour</a>
            </div>`;
        
        document.querySelectorAll('.nav-item[data-premium="true"]').forEach(el => {
            el.classList.add('locked');
            el.innerHTML += '<span class="badge-pro">PRO</span>';
            el.onclick = (e) => { e.preventDefault(); alert("🔒 Option réservée aux membres Premium."); };
        });
    }

    // B. Requête des sites (Bridage SQL)
    let query = supabaseClient.from('sites').select('*').eq('user_id', user.id);
    if (!isPremium) query = query.limit(1); // Force 1 seul site

    const { data: sites } = await query;
    const container = document.getElementById('container');
    container.innerHTML = '';

    for (const site of sites) {
        // Telemetry
        const { data: tel } = await supabaseClient
            .from('telemetry').select('*').eq('site_id', site.id)
            .order('created_at', { ascending: false }).limit(10);

        if (!tel || tel.length === 0) continue;
        const last = tel[0];

        container.innerHTML += `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>🏢 ${site.name}</h3>
                    <span class="status ${last.voltage > 50 ? 'ok' : 'ko'}">${last.voltage > 50 ? '● SBEE' : '● COUPURE'}</span>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin: 15px 0;">
                    <div style="background:#0f172a; padding:15px; border-radius:12px;">
                        <small>Puissance</small><br><b style="font-size:20px;">${Math.round(last.power_w)} W</b>
                    </div>
                    <div style="background:#0f172a; padding:15px; border-radius:12px;">
                        <small>Tension</small><br><b style="font-size:20px;">${last.voltage} V</b>
                    </div>
                </div>
                <canvas id="chart-${site.id}"></canvas>
            </div>`;
        
        setTimeout(() => draw(site.id, tel), 100);
    }

    // C. Slot "Verrouillé"
    if (!isPremium) {
        container.innerHTML += `
            <div class="locked-slot">
                <p>🔒 Multi-sites verrouillé</p>
                <a href="upgrade.html" style="color:var(--warn); font-size:12px;">Débloquer mes autres bâtiments</a>
            </div>`;
    }
}

/** 3. GRAPHIQUE **/
function draw(id, data) {
    const ctx = document.getElementById('chart-' + id);
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map(d => new Date(d.created_at).toLocaleTimeString()).reverse(),
            datasets: [{
                data: data.map(d => d.power_w).reverse(),
                borderColor: '#00c896',
                tension: 0.4,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(0, 200, 150, 0.05)'
            }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { display: false } } }
    });
}

load();
</script>

</body>
</html>
