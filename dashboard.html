<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard EnergyTrack - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <style>
        :root { --bg-dark: #0f172a; --card-grad: linear-gradient(145deg,#182235,#101826); --accent: #00c896; --warning: #ffb547; --danger: #ff4c61; }
        
        body { background: var(--bg-dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; overflow-x: hidden; }
        
        /* Sidebar & Navigation */
        .sidebar { width: 260px; background: #0b1120; height: 100vh; padding: 25px; position: fixed; border-right: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .logo { font-family: 'Orbitron'; font-size: 22px; margin-bottom: 40px; font-weight: 700; }
        .logo span { color: var(--accent); }
        .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; color: #94a3b8; text-decoration: none; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(0,200,150,0.1); color: var(--accent); font-weight: 600; }
        
        /* Premium Locking */
        .nav-item.locked { opacity: 0.5; cursor: not-allowed; }
        .premium-badge { background: var(--warning); color: #000; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; }

        /* Main Content */
        .main { margin-left: 310px; padding: 40px; width: calc(100% - 310px); }
        
        /* Banner Expiration */
        .upgrade-banner { background: linear-gradient(90deg, #ff4c61, #f43f5e); color: white; padding: 20px 25px; border-radius: 16px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.5s ease; }
        .btn-upgrade { background: white; color: #f43f5e; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 14px; }

        /* Grid & Cards */
        .site-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 25px; }
        .site-card { background: var(--card-grad); padding: 25px; border-radius: 26px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .bg-green { background: rgba(0,200,150,0.1); color: var(--accent); }
        .bg-red { background: rgba(255,76,97,0.1); color: var(--danger); }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .metric-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; }
        .metric-val { font-size: 24px; font-weight: 700; display: block; margin-top: 5px; }
        
        .locked-card { border: 2px dashed rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #64748b; min-height: 350px; }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Energy<span>Track</span></div>
    <nav id="nav-menu">
        <a href="dashboard.html" class="nav-item active">🏠 Dashboard</a>
        <a href="consommation.html" class="nav-item">⚡ Consommation</a>
        <a href="capteurs.html" class="nav-item">📡 Capteurs IoT</a>
        
        <div style="margin: 20px 0 10px 10px; font-size: 11px; color: #475569; letter-spacing: 1px; font-weight: 700;">PREMIUM</div>
        <a href="ia.html" class="nav-item" data-premium="true">🤖 Analyse IA</a>
        <a href="rapports.html" class="nav-item" data-premium="true">📊 Rapports PDF</a>
        <a href="sites.html" class="nav-item" data-premium="true">🏢 Multi-sites</a>
        <a href="alertes.html" class="nav-item" data-premium="true">🔔 Alertes IA</a>
        
        <a href="parametres.html" class="nav-item" style="margin-top: 30px;">⚙️ Paramètres</a>
    </nav>
</div>

<div class="main">
    <div id="status-area"></div>
    
    <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div>
            <h1 style="margin:0; font-size:28px;">Supervision Multi-sites</h1>
            <p style="color:#64748b; margin:5px 0 0 0;">Données énergétiques synchronisées en temps réel.</p>
        </div>
    </header>

    <div class="site-grid" id="sitesContainer">
        </div>
</div>

<script>
const charts = {};

/** 1. VÉRIFICATION ABONNEMENT (Table 'subscriptions') **/
async function checkPremiumStatus(userId) {
    try {
        const { data, error } = await supabaseClient
            .from('subscriptions')
            .select('status')
            .eq('user_id', userId)
            .eq('status', 'active')
            .maybeSingle();

        return !!(data && data.status === 'active');
    } catch (e) {
        return false;
    }
}

/** 2. CHARGEMENT PRINCIPAL **/
async function initDashboard() {
    // Auth Check
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { window.location.href = 'auth.html'; return; }

    const isPremium = await checkPremiumStatus(user.id);
    const container = document.getElementById('sitesContainer');
    const statusArea = document.getElementById('status-area');

    // UI LIMITÉE (Bannière + Menu)
    if (!isPremium) {
        statusArea.innerHTML = `
            <div class="upgrade-banner">
                <div>
                    <strong style="font-size:18px;">⚠️ Abonnement Expiré</strong><br>
                    <span>Vous utilisez le mode gratuit. Vos données sont limitées à 1 site.</span>
                </div>
                <a href="billing.html" class="btn-upgrade">RÉACTIVER LE CLOUD</a>
            </div>
        `;
        
        document.querySelectorAll('.nav-item[data-premium="true"]').forEach(item => {
            item.classList.add('locked');
            item.innerHTML += '<span class="premium-badge">PRO</span>';
            item.onclick = (e) => {
                e.preventDefault();
                alert("🚀 Cette fonctionnalité nécessite un abonnement Business Cloud actif.");
            };
        });
    }

    // CHARGEMENT DES SITES (BRIDAGE SQL)
    let query = supabaseClient.from('sites').select('*').eq('user_id', user.id);
    if (!isPremium) query = query.limit(1);

    const { data: sites, error } = await query;
    if (error) return;

    container.innerHTML = '';

    for (const site of sites) {
        // Get Telemetry
        const { data: telemetry } = await supabaseClient
            .from('telemetry')
            .select('*')
            .eq('site_id', site.id)
            .order('created_at', { ascending: false })
            .limit(15);

        if (!telemetry || telemetry.length === 0) continue;

        const live = telemetry[0];
        const totalKwh = telemetry.reduce((sum, row) => sum + Number(row.kwh_total || 0), 0);
        
        // HTML Card
        container.innerHTML += `
            <div class="site-card">
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <h2 style="margin:0; font-size:20px;">🏢 ${site.name}</h2>
                        <span style="color:#64748b; font-size:13px;">📍 ${site.city}</span>
                    </div>
                    <div class="status-badge ${live.voltage > 50 ? 'bg-green' : 'bg-red'}">
                        ${live.voltage > 50 ? '● SBEE OK' : '● COUPURE'}
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-box">
                        <small style="color:#64748b">Puissance Actuelle</small>
                        <span class="metric-val">${Math.round(live.power_w)} W</span>
                    </div>
                    <div class="metric-box">
                        <small style="color:#64748b">Consommation</small>
                        <span class="metric-val">${totalKwh.toFixed(2)} kWh</span>
                    </div>
                </div>

                <canvas id="chart-${site.id}" height="150"></canvas>
            </div>
        `;

        // Render Graphique
        setTimeout(() => renderSiteChart(site.id, telemetry), 100);
    }

    // AJOUTER LE SLOT "BLOQUÉ" SI GRATUIT
    if (!isPremium) {
        container.innerHTML += `
            <div class="site-card locked-card">
                <div style="font-size:40px; margin-bottom:15px;">🔒</div>
                <h3 style="margin:0; color:white;">Multi-sites désactivé</h3>
                <p style="padding:0 20px; font-size:13px;">Passez à la version Pro pour surveiller tous vos bâtiments en temps réel.</p>
                <a href="billing.html" style="color:var(--warning); text-decoration:none; font-weight:700; margin-top:10px;">En savoir plus →</a>
            </div>
        `;
    }
}

function renderSiteChart(id, rawData) {
    const ctx = document.getElementById(`chart-${id}`).getContext('2d');
    const data = [...rawData].reverse();
    
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.map(d => new Date(d.created_at).toLocaleTimeString([], {hour: '2-刻', minute:'2-digit'})),
            datasets: [{
                label: 'Watts',
                data: data.map(d => d.power_w),
                borderColor: '#00c896',
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(0, 200, 150, 0.05)'
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { 
                x: { display: false },
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569', size: 10 } }
            }
        }
    });
}

// Lancement
initDashboard();
</script>

</body>
</html>
