/*
=========================================
PHASE 2 — LOGIQUE DU FILTRE ET RENDU DE CHART.JS
=========================================
*/

function generateChart(siteId, targetSensorId) {
    const rawTelemetry = cachedTelemetryBySite[siteId] || [];
    const ctx = document.getElementById('chart-' + siteId);
    
    if(!ctx || rawTelemetry.length === 0) return;

    // Filtrage des données selon la sélection de la liste déroulante
    let processDataset = rawTelemetry;
    if(targetSensorId !== "ALL") {
        processDataset = rawTelemetry.filter(t => t.sensor_id === targetSensorId);
    }

    // On isole les 12 points les plus récents et on les inverse pour l'affichage chronologique (gauche à droite)
    const displayPoints = [...processDataset].slice(0, 12).reverse();

    const labels = [];
    const values = [];

    displayPoints.forEach(item => {
        labels.push(new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
        values.push(item.power_w);
    });

   if(

charts[siteId]

){

charts[siteId]

.data.labels=

labels;


charts[siteId]

.data.datasets[0]

.data=

values;


charts[siteId]

.update();


return;

}

    charts[siteId] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: targetSensorId === "ALL" ? 'Puissance Totale Combinée (W)' : 'Puissance Appareil (W)',
                data: values,
                borderColor: '#00c896',
                backgroundColor: 'rgba(0,200,150,0.08)',
                fill: true,
                tension: 0.35
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: '#ffffff', font: { family: 'Poppins' } } }
            },
            scales: {
                x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.03)' } },
                y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.03)' } }
            }
        }
    });
}
function scheduleReload(){

clearTimeout(

realtimeTimeout

);


realtimeTimeout =

setTimeout(

()=>{

loadDashboard();

},

15000

);

}
function triggerChartFilter(siteId) {
    const dropdown = document.getElementById(`select-chart-${siteId}`);
    if(dropdown) {
        generateChart(siteId, dropdown.value);
    }
}
