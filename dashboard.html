<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
/* =====================================================================
   LAYOUT GRILLE SITES
   ===================================================================== */
.site-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
  gap: 25px;
  margin-top: 30px;
}

.site-card {
  background: linear-gradient(145deg, #182235, #101826);
  padding: 25px;
  border-radius: 26px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  transition: transform 0.3s, box-shadow 0.3s;
}

.site-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
}

.site-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
  margin-bottom: 25px;
}

/* =====================================================================
   STATUS BADGE
   ===================================================================== */
.status-badge {
  padding: 8px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  transition: background 0.4s, color 0.4s;
}
.green  { background: rgba(0, 200, 150, 0.15); color: #00c896; }
.orange { background: rgba(255, 181, 71, 0.15);  color: #ffb547; }
.red    { background: rgba(255, 76, 97, 0.15);   color: #ff4c61; }

/* =====================================================================
   MÉTRIQUES GRID — 4 TUILES 2×2
   ===================================================================== */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  margin-top: 20px;
}

.metric-box {
  background: #0f1729;
  padding: 18px;
  border-radius: 18px;
  /* Transition douce sur les valeurs */
  transition: box-shadow 0.3s;
}
.metric-box:hover { box-shadow: 0 4px 20px rgba(0, 200, 150, 0.08); }

.metric-title {
  font-size: 12px;
  color: #94a3b8;
  font-weight: 500;
  letter-spacing: 0.3px;
}

.metric-value {
  font-size: 24px;
  margin-top: 10px;
  font-weight: 700;
  /* Transition visible sur changement de valeur */
  transition: color 0.4s;
}

/* =====================================================================
   LIVE DOT
   ===================================================================== */
.live-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #00c896;
  display: inline-block;
  margin-right: 8px;
  animation: pulse 1.4s infinite;
}

/* =====================================================================
   PREMIUM BANNER
   ===================================================================== */
.premium-banner {
  background: linear-gradient(135deg, rgba(255, 181, 71, 0.15), rgba(24, 34, 53, 0.4));
  border: 1px solid rgba(255, 181, 71, 0.3);
  padding: 22px;
  border-radius: 20px;
  margin-bottom: 25px;
}

/* =====================================================================
   SENSOR SELECTOR
   ===================================================================== */
.sensor-selector-container {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sensor-select {
  width: 100%;
  padding: 12px;
  background: #0f1729;
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 12px;
  outline: none;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  cursor: pointer;
  transition: border-color 0.25s;
}
.sensor-select:focus { border-color: #00c896; }

/* =====================================================================
   SECTIONS D'ANALYSE
   ===================================================================== */
.analysis-section {
  background: rgba(15, 23, 41, 0.6);
  border-radius: 16px;
  padding: 16px;
  margin-top: 15px;
  border: 1px solid rgba(255, 255, 255, 0.02);
}

.analysis-title {
  font-size: 11px;
  color: #94a3b8;
  font-weight: 600;
  letter-spacing: 0.6px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.data-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}
.data-row:last-child { border-bottom: none; }

/* =====================================================================
   PREMIUM LOCKED BOX
   ===================================================================== */
.premium-locked-box {
  background: rgba(15, 23, 41, 0.8);
  border: 1px dashed rgba(255, 181, 71, 0.2);
  padding: 15px;
  border-radius: 14px;
  text-align: center;
  margin-top: 15px;
}

/* =====================================================================
   SQUELETTE DE CHARGEMENT (placeholder au premier rendu)
   ===================================================================== */
.skeleton {
  background: linear-gradient(90deg, #1a2740 25%, #1f3050 50%, #1a2740 75%);
  background-size: 200% 100%;
  animation: skeleton-shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes skeleton-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* =====================================================================
   ANIMATIONS GLOBALES
   ===================================================================== */
@keyframes pulse {
  0%   { opacity: 0.3; transform: scale(1);   }
  50%  { opacity: 1;   transform: scale(1.2); }
  100% { opacity: 0.3; transform: scale(1);   }
}

/* Fade-in d'une carte lors du premier rendu */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0);    }
}
.site-card { animation: cardIn 0.35s ease both; }
</style>
</head>

     MAIN

  <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; margin-bottom:20px;">

<!-- ================================================================
     JAVASCRIPT PRINCIPAL
     ================================================================ -->
<script>
/* =================================================================
   ÉTAT GLOBAL
   ================================================================= */
const charts = {};                  // instances Chart.js — réutilisées, jamais recréées
let cachedTelemetryBySite = {};     // cache télémétrie par site — pour filtre graphique sans requête
let realtimeTimeout       = null;   // debounce realtime
let canAccessMultiSite    = false;
let canAccessMultiSensor  = false;

// IDs des sites déjà rendus dans le DOM (pour différencier 1er rendu vs mise à jour)
const renderedSites = new Set();

/* =================================================================
   UTILITAIRES
   ================================================================= */

/** Formate l'énergie : <1 kWh → "245 Wh", ≥1 kWh → "1.2 kWh" */
function formatEnergy(kwh) {
  if (kwh < 1) return `${Math.round(kwh * 1000)} Wh`;
  return `${kwh.toFixed(2)} kWh`;
}

/** Formate un nombre en FCFA avec espace comme séparateur milliers */
function formatFcfa(n) {
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '\u202f');
}

/** Retourne { text, cssClass } selon état réseau */
function resolveStatus(latest) {
  if (!latest) return { text: 'HORS LIGNE', cssClass: 'red' };
  if (latest.voltage < 50)           return { text: 'COUPURE',      cssClass: 'red'    };
  if (latest.source === 'GROUPE')    return { text: 'GROUPE ACTIF', cssClass: 'orange' };
  return                                    { text: 'SBEE OK',       cssClass: 'green'  };
}

/** Mise à jour douce d'un élément texte (évite le flash si identique) */
function safeSetText(id, value) {
  const el = document.getElementById(id);
  if (el && el.textContent !== String(value)) el.textContent = value;
}

/** Mise à jour douce d'un attribut de classe */
function safeSetClass(el, removePat, addCls) {
  if (!el) return;
  if (!el.classList.contains(addCls)) {
    el.classList.remove(...removePat);
    el.classList.add(addCls);
  }
}

/* =================================================================
   AUTHENTIFICATION
   ================================================================= */
async function getUser() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if (!user) { window.location.href = 'auth.html'; return null; }
  return user;
}

/* =================================================================
   BANNIÈRE ABONNEMENT (affichée une seule fois)
   ================================================================= */
function showFreeBanner() {
  const banner = document.getElementById('subscriptionBanner');
  if (banner.innerHTML !== '') return; // déjà injectée
  banner.innerHTML = `
    <div class="premium-banner">
      <h3 style="margin-bottom:18px; color:#ffb547; font-family:'Orbitron';">Plan Essential</h3>
      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:15px; margin-bottom:20px;">
        <div style="background:rgba(255,76,97,0.08); padding:15px; border-radius:12px;">
          <b>❌ Essential</b>
          <p style="margin-top:10px; color:#94a3b8;">1 site<br>1 capteur</p>
        </div>
        <div style="background:rgba(0,200,150,0.08); padding:15px; border-radius:12px;">
          <b>🚀 Business</b>
          <p style="margin-top:10px;">∞ sites<br>∞ capteurs<br>IA<br>PDF</p>
        </div>
      </div>
      <button onclick="window.location.href='pricing.html'"
        style="padding:14px 24px; background:#00c896; border:none; border-radius:12px; font-weight:700; cursor:pointer;">
        🚀 Passer Premium Business
      </button>
    </div>`;
}

/* =================================================================
   GÉNÉRATION HTML INITIAL D'UNE CARTE SITE
   (appelée UNE seule fois par site, au premier rendu)
   ================================================================= */
function buildSiteCardHTML(site, sensors, aiEnabled) {
  const sid = site.id;
  const sensorOptions = sensors.map(s =>
    `<option value="${s.id}">🔌 ${s.name}</option>`
  ).join('');

  const aiBlock = aiEnabled ? `
    <div id="ai-block-${sid}" style="font-size:13px; color:#00c896; padding:5px 0;">
      🤖 <b>Analyse IA active :</b> <span id="ai-msg-${sid}">Chargement…</span>
    </div>
    <button onclick="exportPDF()"
      style="width:100%; padding:10px; margin-top:10px; background:#182235;
             border:1px solid #00c896; color:#00c896; border-radius:10px;
             cursor:pointer; font-weight:600;">
      📥 Exporter rapport PDF
    </button>` : `
    <div class="premium-locked-box">
      <span style="font-size:12px; color:#ffb547; font-weight:600;">🤖 Analyse IA & Exports PDF Verrouillés</span>
      <p style="font-size:11px; color:#94a3b8; margin-top:5px;">
        Passez au Plan Business Cloud pour activer l'audit prédictif IA.
      </p>
    </div>`;

  return `
  <div class="site-card" id="card-${sid}">

    <!-- EN-TÊTE SITE -->
    <div class="site-header">
      <div>
        <h2>🏢 ${site.name}</h2>
        <p style="margin-top:8px; color:#94a3b8;">📍 ${site.city}</p>
      </div>
      <div class="status-badge green" id="status-badge-${sid}">SBEE OK</div>
    </div>

    <!-- SANTÉ / DISPONIBILITÉ -->
    <div style="display:flex; gap:15px; margin-bottom:15px; font-size:12px; color:#94a3b8;">
      <span>📡 Capteurs : <b id="sensor-count-${sid}">—</b></span>
      <span>🟢 Disponibilité : <b id="health-val-${sid}" style="transition:color 0.4s;">—</b></span>
    </div>

    <!-- KPI GRID : 4 tuiles indépendantes (HTML propre, pas d'imbrication) -->
    <div class="metrics-grid">

      <!-- Tuile 1 : Puissance instantanée -->
      <div class="metric-box">
        <div class="metric-title">⚡ Puissance instantanée</div>
        <div class="metric-value" id="kpi-power-${sid}">— W</div>
      </div>

      <!-- Tuile 2 : Énergie consommée -->
      <div class="metric-box">
        <div class="metric-title">🔋 Énergie consommée</div>
        <div class="metric-value" id="kpi-energy-${sid}">— Wh</div>
      </div>

      <!-- Tuile 3 : Capteurs actifs (indépendant) -->
      <div class="metric-box">
        <div class="metric-title">📡 Capteurs actifs</div>
        <div class="metric-value" id="kpi-sensors-${sid}">—</div>
        <div style="font-size:12px; color:#94a3b8; margin-top:8px;" id="kpi-sensors-sub-${sid}">— ONLINE</div>
      </div>

      <!-- Tuile 4 : Alertes actives (indépendant) -->
      <div class="metric-box">
        <div class="metric-title">⚠️ Alertes actives</div>
        <div class="metric-value" id="kpi-alerts-${sid}" style="color:#ff4c61;">—</div>
        <div style="font-size:12px; color:#ff4c61; margin-top:8px;">Diagnostics</div>
      </div>

      <!-- Tuile 5 : Coût cumulé (span 2 colonnes sur mobile) -->
      <div class="metric-box" style="grid-column: 1 / -1; border:1px solid rgba(0,200,150,0.12);">
        <div class="metric-title">💰 Coût cumulé</div>
        <div class="metric-value" style="color:#00c896;" id="kpi-cost-${sid}">— F</div>
      </div>

      <!-- Tuile 6 : Top consommateur -->
      <div class="metric-box" style="grid-column: 1 / -1; border:1px solid rgba(255,181,71,0.15);">
        <div class="metric-title" style="color:#ffb547;">🔥 Top Appareil</div>
        <div style="font-size:14px; margin-top:5px; line-height:1.5; color:#fff;" id="kpi-top-${sid}">
          — <br><span style="font-size:20px; font-weight:700; color:#ffb547;">— W</span>
        </div>
      </div>
    </div>

    <!-- ÉTATS RÉSEAU -->
    <div class="analysis-section">
      <div class="analysis-title">📡 États Réseau & Électrique</div>
      <div class="data-row">
        <span>Dernière émission IoT</span>
        <span style="font-family:'Orbitron'; font-size:12px;" id="last-emit-${sid}">—</span>
      </div>
      <div class="data-row">
        <span>Dernière coupure secteur</span>
        <span style="color:#ff4c61;" id="last-cut-${sid}">—</span>
      </div>
    </div>

    <!-- TOP CONSOMMATEURS & COÛTS -->
    <div class="analysis-section">
      <div class="analysis-title">📊 Top Consommateurs & Coûts</div>
      <div id="breakdown-${sid}"></div>
    </div>

    <!-- DIAGNOSTICS & ALERTES -->
    <div class="analysis-section"
         style="background:rgba(255,76,97,0.02); border:1px solid rgba(255,76,97,0.1);">
      <div class="analysis-title" style="color:#ff4c61;">🔔 Diagnostics & Alertes Appareils</div>
      <div id="alerts-list-${sid}">
        <div style="color:#00c896; font-size:13px;">✔ Chargement…</div>
      </div>
    </div>

    <!-- SÉLECTEUR GRAPHIQUE -->
    <div class="sensor-selector-container">
      <span class="metric-title">Analyse graphique ciblée :</span>
      <select class="sensor-select" id="select-chart-${sid}"
              onchange="triggerChartFilter('${sid}')">
        <option value="ALL">Tous les capteurs réunis</option>
        ${sensorOptions}
      </select>
    </div>

    <!-- CANVAS CHART.JS (stable — jamais détruit si déjà créé) -->
    <div style="margin-top:25px;">
      <canvas id="chart-${sid}"></canvas>
    </div>

    <!-- MODULES AVANCÉS (IA / PDF) -->
    <div class="analysis-section" style="margin-top:20px; background:rgba(255,255,255,0.01);">
      <div class="analysis-title">✨ Modules Avancés</div>
      ${aiBlock}
    </div>

  </div>`;
}

/* =================================================================
   MISE À JOUR IN-PLACE D'UNE CARTE EXISTANTE
   (pas de innerHTML global — uniquement les valeurs changent)
   ================================================================= */
function updateSiteCard(site, sensors, telemetry, activeAlerts, tariff, aiEnabled) {
  const sid = site.id;

  /* ---- Statut réseau ---- */
  const latest  = telemetry[0] || null;
  const { text: statusText, cssClass } = resolveStatus(latest);
  const badge   = document.getElementById(`status-badge-${sid}`);
  if (badge) {
    badge.textContent = statusText;
    safeSetClass(badge, ['green', 'orange', 'red'], cssClass);
  }

  /* ---- Santé / disponibilité ---- */
  const onlineCount = sensors.filter(s => s.status === 'ONLINE').length;
  const totalCount  = sensors.length;
  const healthPct   = totalCount > 0 ? Math.round((onlineCount / totalCount) * 100) : 0;
  let healthColor   = '#00c896';
  if (healthPct < 70) healthColor = '#ffb547';
  if (healthPct < 40) healthColor = '#ff4c61';

  const healthEl = document.getElementById(`health-val-${sid}`);
  if (healthEl) {
    healthEl.textContent = `${healthPct}%`;
    healthEl.style.color = healthColor;
  }
  safeSetText(`sensor-count-${sid}`, `${onlineCount}/${totalCount}`);

  /* ---- KPI Puissance instantanée ---- */
  const powerW = latest ? Math.round(latest.power_w) : 0;
  safeSetText(`kpi-power-${sid}`, `${powerW} W`);

  /* ---- KPI Énergie consommée ---- */
  const consumptionMapBySensor = {};
  let lastPowerCutTime = 'Aucune coupure enregistrée';
  let lastTransmissionTime = '—';

  telemetry.forEach(item => {
    if (item.voltage < 50 && lastPowerCutTime === 'Aucune coupure enregistrée') {
      lastPowerCutTime = new Date(item.created_at).toLocaleTimeString();
    }
    const kwh   = Number(item.kwh_total || 0);
    const sName = item.sensors ? item.sensors.name : 'Générique';
    if (!consumptionMapBySensor[sName]) consumptionMapBySensor[sName] = { kwh: 0 };
    if (kwh > consumptionMapBySensor[sName].kwh) consumptionMapBySensor[sName].kwh = kwh;
  });

  let totalKwh = 0;
  Object.values(consumptionMapBySensor).forEach(v => { totalKwh += v.kwh; });

  if (telemetry[0]) {
    lastTransmissionTime = new Date(telemetry[0].created_at).toLocaleTimeString();
  }

  safeSetText(`kpi-energy-${sid}`, formatEnergy(totalKwh));

  /* ---- KPI Capteurs actifs ---- */
  safeSetText(`kpi-sensors-${sid}`, totalCount);
  safeSetText(`kpi-sensors-sub-${sid}`, `${onlineCount} ONLINE`);

  /* ---- KPI Alertes actives ---- */
  safeSetText(`kpi-alerts-${sid}`, activeAlerts.length);

  /* ---- KPI Coût cumulé ---- */
  const estimatedCost = Math.round(totalKwh * tariff);
  safeSetText(`kpi-cost-${sid}`, `${formatFcfa(estimatedCost)} F`);

  /* ---- KPI Top Appareil ---- */
  const telSortedByPower = [...telemetry].sort((a, b) => b.power_w - a.power_w);
  const topRecord  = telSortedByPower[0];
  const topName    = topRecord?.sensors?.name || 'Inconnu';
  const topPower   = topRecord ? Math.round(topRecord.power_w) : 0;
  const topEl      = document.getElementById(`kpi-top-${sid}`);
  if (topEl) {
    topEl.innerHTML = `${topName}<br><span style="font-size:20px; font-weight:700; color:#ffb547;">${topPower} W</span>`;
  }

  /* ---- États réseau ---- */
  safeSetText(`last-emit-${sid}`, lastTransmissionTime);
  safeSetText(`last-cut-${sid}`, lastPowerCutTime);

  /* ---- Breakdown top consommateurs ---- */
  const breakdownEl = document.getElementById(`breakdown-${sid}`);
  if (breakdownEl) {
    const sorted = Object.entries(consumptionMapBySensor)
      .sort((a, b) => b[1].kwh - a[1].kwh)
      .slice(0, 3);

    breakdownEl.innerHTML = sorted.map(([name, data]) => {
      const cost    = Math.round(data.kwh * tariff);
      const pct     = totalKwh > 0 ? Math.round((data.kwh / totalKwh) * 100) : 0;
      return `<div class="data-row">
        <span>📡 ${name} (${pct}%)</span>
        <b>${formatFcfa(cost)} FCFA</b>
      </div>`;
    }).join('');
  }

  /* ---- Alertes appareils ---- */
  const alertsListEl = document.getElementById(`alerts-list-${sid}`);
  if (alertsListEl) {
    if (activeAlerts.length === 0) {
      alertsListEl.innerHTML = `<div style="color:#00c896; font-size:13px;">✔ Aucun dysfonctionnement détecté</div>`;
    } else {
      alertsListEl.innerHTML = activeAlerts.map(alt => {
        const lbl = alt.sensors ? alt.sensors.name : 'Général';
        return `<div class="data-row" style="color:#ff4c61; border-bottom:1px solid rgba(255,76,97,0.1);">
          <span>⚠️ <b>${lbl}</b> : ${alt.description || 'Seuil dépassé'}</span>
        </div>`;
      }).join('');
    }
  }

  /* ---- IA message (si activée) ---- */
  if (aiEnabled) {
    const aiMsgEl = document.getElementById(`ai-msg-${sid}`);
    if (aiMsgEl) {
      aiMsgEl.textContent =
        `Votre équipement "${topName}" surconsomme de 30% par rapport à sa classe énergétique nominale.`;
    }
  }

  /* ---- Graphique : mise à jour stable (chart.update() sans destroy) ---- */
  updateChart(sid, 'ALL');
}

/* =================================================================
   GRAPHIQUES CHART.JS — LOGIQUE STABLE (pas de destroy)
   ================================================================= */

/**
 * Crée le graphique si inexistant, sinon met à jour ses données.
 * Filtre selon la valeur du select (targetSensorId = "ALL" ou ID capteur).
 */
function updateChart(siteId, targetSensorId) {
  const rawTelemetry = cachedTelemetryBySite[siteId] || [];
  const ctx = document.getElementById(`chart-${siteId}`);
  if (!ctx || rawTelemetry.length === 0) return;

  /* Filtrage côté client (pas de requête Supabase) */
  let dataset = rawTelemetry;
  if (targetSensorId !== 'ALL') {
    dataset = rawTelemetry.filter(t => t.sensor_id === targetSensorId);
  }

  const displayPoints = [...dataset].slice(0, 12).reverse();
  const labels = displayPoints.map(item =>
    new Date(item.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
  );
  const values = displayPoints.map(item => item.power_w);

  if (charts[siteId]) {
    /* ✅ Mise à jour in-place — AUCUN destroy, AUCUN flash */
    charts[siteId].data.labels                  = labels;
    charts[siteId].data.datasets[0].data        = values;
    charts[siteId].data.datasets[0].label       =
      targetSensorId === 'ALL' ? 'Puissance Totale Combinée (W)' : 'Puissance Appareil (W)';
    charts[siteId].update('none'); // 'none' = pas d'animation sur update (fluide)
  } else {
    /* Premier rendu : création unique */
    charts[siteId] = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: targetSensorId === 'ALL' ? 'Puissance Totale Combinée (W)' : 'Puissance Appareil (W)',
          data: values,
          borderColor: '#00c896',
          backgroundColor: 'rgba(0, 200, 150, 0.08)',
          fill: true,
          tension: 0.35,
          pointRadius: 3,
          pointHoverRadius: 6,
        }]
      },
      options: {
        responsive: true,
        animation: { duration: 400 },
        plugins: {
          legend: { labels: { color: '#ffffff', font: { family: 'Poppins' } } }
        },
        scales: {
          x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.03)' } },
          y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.03)' } }
        }
      }
    });
  }
}

/* Handler select déroulant */
function triggerChartFilter(siteId) {
  const dropdown = document.getElementById(`select-chart-${siteId}`);
  if (dropdown) updateChart(siteId, dropdown.value);
}

/* =================================================================
   CHARGEMENT / RAFRAÎCHISSEMENT DES DONNÉES
   (ne reconstruit PAS le DOM si la carte existe déjà)
   ================================================================= */
async function loadDashboard() {
  const user = await getUser();
  if (!user) return;

  /* Tarif SBEE de l'utilisateur */
  const { data: userSettings } = await supabaseClient
    .from('settings').select('tariff').eq('user_id', user.id).single();
  const tariff = userSettings?.tariff || 91;

  /* Récupération des sites */
  const { data: sites, error: sitesError } = await supabaseClient
    .from('sites').select('*').eq('user_id', user.id);

  if (sitesError || !sites) { console.error(sitesError); return; }

  /* Feature flag multi-site */
  let filteredSites = canAccessMultiSite ? sites : sites.slice(0, 1);

  const container = document.getElementById('sitesContainer');

  if (filteredSites.length === 0) {
    container.innerHTML = `
      <div class="site-card">
        <h2>Aucun site enregistré</h2>
        <p style="margin-top:20px; color:#94a3b8;">Ajoutez un site depuis le menu pour commencer le suivi.</p>
      </div>`;
    return;
  }

  /* Feature flag IA */
  const aiEnabled = await hasFeature('ai');

  /* Boucle sur les sites filtrés */
  for (const site of filteredSites) {
    const sid = site.id;

    /* 1. Capteurs */
    const { data: allSensors } = await supabaseClient
      .from('sensors').select('*').eq('site_id', sid);
    let activeSensors = allSensors || [];
    if (!canAccessMultiSensor && activeSensors.length > 1) {
      activeSensors = activeSensors.slice(0, 1);
    }
    const sensorIds = activeSensors.map(s => s.id);

    /* 2. Télémétrie */
    let telemetry = [];
    if (sensorIds.length > 0) {
      const { data } = await supabaseClient
        .from('telemetry')
        .select('*, sensors(name)')
        .in('sensor_id', sensorIds)
        .order('created_at', { ascending: false });
      telemetry = data || [];
    }
    cachedTelemetryBySite[sid] = telemetry; // mise en cache pour le filtre graphique

    /* 3. Alertes actives */
    let activeAlerts = [];
    if (sensorIds.length > 0) {
      const { data } = await supabaseClient
        .from('alerts')
        .select('*, sensors(name)')
        .in('sensor_id', sensorIds)
        .eq('status', 'ACTIVE');
      activeAlerts = data || [];
    }

    /* ——————————————————————————————————————————————————
       Décision CRITIQUE : 1er rendu OU mise à jour ?
       —————————————————————————————————————————————————— */
    if (!renderedSites.has(sid)) {
      /* Premier rendu : on injecte la carte dans le DOM */
      if (telemetry.length === 0) {
        container.innerHTML += `
          <div class="site-card" id="card-${sid}">
            <h2>🏢 ${site.name}</h2>
            <p style="margin-top:20px; color:#94a3b8;">Aucune donnée disponible pour ce site.</p>
          </div>`;
      } else {
        container.innerHTML += buildSiteCardHTML(site, activeSensors, aiEnabled);
      }
      renderedSites.add(sid);

      /* Mise à jour immédiate des valeurs après injection */
      if (telemetry.length > 0) {
        updateSiteCard(site, activeSensors, telemetry, activeAlerts, tariff, aiEnabled);
        updateChart(sid, 'ALL');
      }

    } else {
      /* Rafraîchissement : mise à jour in-place UNIQUEMENT */
      if (telemetry.length > 0) {
        updateSiteCard(site, activeSensors, telemetry, activeAlerts, tariff, aiEnabled);
        /* Le graphique est mis à jour via updateChart dans updateSiteCard */
      }
    }
  }
}

/* =================================================================
   REALTIME SUPABASE — DEBOUNCE 15s (privilégie mise à jour locale)
   ================================================================= */
function scheduleReload() {
  clearTimeout(realtimeTimeout);
  realtimeTimeout = setTimeout(() => {
    loadDashboard(); // appel complet mais mise à jour in-place = pas de clignotement
  }, 15000);
}

function startRealtime() {
  supabaseClient
    .channel('dashboard-live')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'telemetry' }, () => {
      scheduleReload();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'alerts' }, () => {
      scheduleReload();
    })
    .subscribe();
}

/* =================================================================
   INITIALISATION
   ================================================================= */
async function initDashboard() {
  canAccessMultiSite   = await canUseMultiSite();
  canAccessMultiSensor = await canUseMultiSensor();

  if (!canAccessMultiSite && !canAccessMultiSensor) {
    showFreeBanner();
  }

  await loadDashboard();
  startRealtime();
}
