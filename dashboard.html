<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard EnergyTrack</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/feature-access.js"></script>
<style>
body{background:#020d26;color:#fff;font-family:Arial;margin:0} .main{padding:30px}
.site-card{background:#182235;padding:24px;border-radius:22px;margin-top:20px}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.box{background:#0f1729;padding:16px;border-radius:14px}
canvas{margin-top:20px}.badge{padding:8px 12px;border-radius:20px;background:#2a2}
</style></head>
<body><div class="main">
<div id="subscriptionBanner"></div>
<h1>Dashboard EnergyTrack</h1>
<p>🟢 Supervision énergétique analytique</p>
<div id="sitesContainer"></div>
</div>
<script>
let charts={},cached={}; let canAccessMultiSite=false,canAccessMultiSensor=false;

async function getUser(){let {data}=await supabaseClient.auth.getUser(); return data.user}
async function loadDashboard(){
const user=await getUser(); if(!user)return;
const {data:settings}=await supabaseClient.from('settings').select('tariff').eq('user_id',user.id).single();
const tariff=settings?.tariff||91;
const {data:sites}=await supabaseClient.from('sites').select('*').eq('user_id',user.id);
const c=document.getElementById('sitesContainer'); c.innerHTML='';
for(const site of (canAccessMultiSite?sites:sites.slice(0,1))){
let {data:sensors}=await supabaseClient.from('sensors').select('*').eq('site_id',site.id);
if(!canAccessMultiSensor)sensors=sensors.slice(0,1);
const ids=sensors.map(x=>x.id);
let telemetry=[]; if(ids.length){let r=await supabaseClient.from('telemetry').select('*,sensors(name)').in('sensor_id',ids).order('created_at',{ascending:false}); telemetry=r.data||[]}
if(!telemetry.length){c.innerHTML+=`<div class="site-card"><h2>${site.name}</h2><p>Aucune donnée</p></div>`; continue;}
cached[site.id]=telemetry;
let latest=telemetry[0], totalKwh=telemetry.reduce((a,b)=>a+(+b.kwh_total||0),0), cost=Math.round(totalKwh*tariff);
let online=sensors.filter(s=>s.status=='ONLINE').length, health=Math.round((online/Math.max(sensors.length,1))*100);
let top=[...telemetry].sort((a,b)=>b.power_w-a.power_w)[0];
c.innerHTML += `<div class="site-card">
<h2>🏢 ${site.name}</h2><span class="badge">${latest.source||'SBEE'}</span>
<p>🟢 Disponibilité ${health}% | 📡 ${online}/${sensors.length}</p>
<div class="metrics">
<div class="box"><small>⚡ Puissance instantanée</small><h2>${Math.round(latest.power_w)} W</h2></div>
<div class="box"><small>🔋 Énergie</small><h2>${totalKwh<1?Math.round(totalKwh*1000)+' Wh':totalKwh.toFixed(2)+' kWh'}</h2></div>
<div class="box"><small>💰 Coût</small><h2>${cost} FCFA</h2></div>
<div class="box"><small>🔥 Top appareil</small><h2>${top.sensors?.name||'N/A'}<br>${Math.round(top.power_w)}W</h2></div>
<div class="box"><small>⏱ Dernière émission</small><h2>${new Date(latest.created_at).toLocaleTimeString()}</h2></div>
<div class="box"><small>📡 Capteurs actifs</small><h2>${online}</h2></div>
</div>
<select id="s-${site.id}" onchange="draw('${site.id}')"><option value="ALL">Tous</option>${sensors.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
<canvas id="chart-${site.id}"></canvas></div>`;
draw(site.id);
}
}
function draw(siteId){
let t=cached[siteId]||[], sel=document.getElementById('s-'+siteId)?.value||'ALL';
if(sel!='ALL') t=t.filter(x=>x.sensor_id==sel);
let pts=t.slice(0,12).reverse();
let labels=pts.map(x=>new Date(x.created_at).toLocaleTimeString()), vals=pts.map(x=>x.power_w);
if(charts[siteId]){charts[siteId].data.labels=labels; charts[siteId].data.datasets[0].data=vals; charts[siteId].update(); return;}
charts[siteId]=new Chart(document.getElementById('chart-'+siteId),{type:'line',data:{labels:labels,datasets:[{label:'Puissance',data:vals,borderColor:'#00c896'}]}});
}
function startRealtime(){supabaseClient.channel('d').on('postgres_changes',{event:'INSERT',schema:'public',table:'telemetry'},()=>loadDashboard()).subscribe();}
async function init(){canAccessMultiSite=await canUseMultiSite(); canAccessMultiSensor=await canUseMultiSensor(); await loadDashboard(); startRealtime();}
init();
</script></body></html>
