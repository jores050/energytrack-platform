<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>
/* ===================================================================
   VARIABLES GLOBALES (Préservées à l'identique)
   =================================================================== */
:root {
  --bg-deep:        #080f1c;
  --bg-card:        #0f1829;
  --bg-inset:       #0a1020;
  --accent-green:   #00d4a0;
  --accent-amber:   #f5a623;
  --accent-red:     #ff4d6a;
  --accent-blue:    #3b82f6;
  --text-primary:   #e8f0fe;
  --text-secondary: #7e8b9b;
  --border-glow:    rgba(0, 212, 160, 0.1);
  --shadow-main:    0 12px 32px rgba(4, 7, 13, 0.4);
}

/* Ton style CSS complet est conservé ici... */
* { margin:0; padding:0; box-sizing:border-box; }
body { background-color: var(--bg-deep); color: var(--text-primary); font-family: 'DM Sans', sans-serif; display: flex; min-height: 100vh; overflow: hidden; }
.app-container { display: flex; width: 100%; height: 100vh; position: relative; }
.sidebar { width: 280px; background-color: var(--bg-card); display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.03); padding: 32px 24px; z-index: 10; }
.brand { display: flex; align-items: center; gap: 14px; margin-bottom: 48px; padding-left: 8px; }
.brand-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent-green), #00b4d8); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 20px rgba(0, 212, 160, 0.3); }
.brand-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; background: radial-gradient(circle at 50% 0%, #111d35 0%, var(--bg-deep) 70%); }
.dashboard-view { padding: 40px; display: flex; flex-direction: column; gap: 32px; }

/* Grid de tes cartes d'origine */
.metrics-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
.m-card { background-color: var(--bg-card); border-radius: 24px; padding: 28px; border: 1px solid rgba(255,255,255,0.02); box-shadow: var(--shadow-main); position: relative; overflow: hidden; transition: transform 0.3s, border-color 0.3s; }
.m-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.06); }
.m-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: transparent; }
.m-card.c-power::before { background: linear-gradient(to right, var(--accent-green), #059669); }
.m-card.c-voltage::before { background: linear-gradient(to right, var(--accent-blue), #2563eb); }
.m-card.c-freq::before { background: linear-gradient(to right, var(--accent-amber), #d97706); }
.m-card.c-cost::before { background: linear-gradient(to right, #c084fc, #8b5cf6); }

.m-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.m-value-box { display: flex; align-items: baseline; gap: 6px; }
.m-value { font-family: 'Orbitron', sans-serif; font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
.m-unit { font-size: 16px; font-weight: 500; color: var(--text-secondary); }

/* Badges Status originaux */
.status-badge { padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 6px; text-transform: uppercase; }
.status-badge.active { background-color: rgba(0, 212, 160, 0.1); color: var(--accent-green); box-shadow: inset 0 0 12px rgba(0,212,160,0.05); }
.status-badge.generator { background-color: rgba(245, 166, 237, 0.1); color: #e040fb; box-shadow: inset 0 0 12px rgba(224,64,251,0.05); }
.status-badge.danger { background-color: rgba(255, 77, 106, 0.1); color: var(--accent-red); }

/* Graphique */
.chart-card { background-color: var(--bg-card); border-radius: 28px; padding: 32px; border: 1px solid rgba(255,255,255,0.02); box-shadow: var(--shadow-main); }
</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      <span class="brand-name">EnergyTrack</span>
    </div>
    </aside>

  <main class="main-content">
    <div class="dashboard-view">
      
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <select id="siteSelector" onchange="loadSensors()" style="background:var(--bg-card); color:white; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); margin-right:10px;"></select>
          <select id="sensorSelector" onchange="loadDashboard()" style="background:var(--bg-card); color:white; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);"></select>
        </div>
        <div id="networkStatusBox">
          <span class="status-badge active"><span class="dot"></span>SBEE OK</span>
        </div>
      </div>

      <section class="metrics-summary">
        <div class="m-card c-power">
          <div class="m-label">Puissance Active</div>
          <div class="m-value-box">
            <span class="m-value" id="powerValue">0.0</span>
            <span class="m-unit">kW</span>
          </div>
        </div>
        <div class="m-card c-voltage">
          <div class="m-label">Tension Réseau</div>
          <div class="m-value-box">
            <span class="m-value" id="voltageValue">0</span>
            <span class="m-unit">V</span>
          </div>
        </div>
        <div class="m-card c-freq">
          <div class="m-label">Fréquence & Facteur</div>
          <div class="m-value-box">
            <span class="m-value" id="freqValue">0.00</span>
            <span class="m-unit">Hz</span>
          </div>
          <div style="font-size:12px; color:var(--text-secondary); margin-top:5px;" id="pfValue">cos φ: 0.00</div>
        </div>
        <div class="m-card c-cost">
          <div class="m-label">Coût Consommation</div>
          <div class="m-value-box">
            <span class="m-value" id="costValue">0</span>
            <span class="m-unit">FCFA</span>
          </div>
        </div>
      </section>

      <section class="chart-card">
        <canvas id="mainEnergyChart" height="280"></canvas>
      </section>

    </div>
  </main>
</div>

<script>
// --- MANAGEMENT DES APPAREILS ET GRAPHIQUES (Fidèle à tes scripts d'origine) ---
let mainChart;
const ctx = document.getElementById('mainEnergyChart').getContext('2d');

function initChart(labels = [], dataPoints = []) {
    if (mainChart) mainChart.destroy();
    mainChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Puissance Active (W)',
                data: dataPoints,
                borderColor: '#00d4a0',
                backgroundColor: 'rgba(0, 212, 160, 0.03)',
                borderWidth: 2,
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false }, ticks: { color: '#7e8b9b' } },
                y: { grid: { color: 'rgba(255,255,255,0.01)' }, ticks: { color: '#7e8b9b' } }
            }
        }
    });
}

// --- CHARGEMENT DYNAMIQUE DES DONNÉES DEPUIS SUPABASE ---
async function loadDashboard() {
    const sensorId = document.getElementById('sensorSelector').value;
    if (!sensorId) return;

    // 1. Récupérer l'historique récent (20 derniers points) pour le graphique
    const { data: history } = await supabaseClient
        .from('telemetry')
        .select('*')
        .eq('sensor_id', sensorId)
        .order('created_at', { ascending: false })
        .limit(20);

    if (history && history.length > 0) {
        // Inverser pour avoir l'ordre chronologique sur le graphique
        const cleanHistory = history.reverse();
        const labels = cleanHistory.map(t => new Date(t.created_at).toLocaleTimeString('fr-FR'));
        const powerData = cleanHistory.map(t => t.power_w);
        
        initChart(labels, powerData);

        // Mettre à jour l'affichage avec la toute dernière ligne
        const latest = cleanHistory[cleanHistory.length - 1];
        updateDashboardUI(latest);
    }
}

// --- MISE À JOUR DE L'INTERFACE GRAPHIQUE (Cartes & Badges d'origine) ---
function updateDashboardUI(data) {
    // 1. Conversion en kW pour coller à ton affichage "1.2 kW"
    const kwValue = (data.power_w / 1000).toFixed(2);
    document.getElementById('powerValue').innerText = kwValue;
    
    // 2. Tension, Fréquence et Facteur de puissance (cos phi)
    document.getElementById('voltageValue').innerText = data.voltage;
    document.getElementById('freqValue').innerText = data.freq ? data.freq : '50.00';
    document.getElementById('pfValue').innerText = `cos φ: ${data.pf ? data.pf : '0.95'}`;
    
    // 3. Coût Financier accumulé
    document.getElementById('costValue').innerText = data.cost_fcfa ? data.cost_fcfa : '0';

    // 4. Changement dynamique de ton badge réseau original
    const statusBox = document.getElementById('networkStatusBox');
    if (data.sbee_ok === false || data.source === 'GROUPE') {
        statusBox.innerHTML = `<span class="status-badge generator"><span class="dot"></span>⚠️ COUPURE / GROUPE</span>`;
    } else {
        statusBox.innerHTML = `<span class="status-badge active"><span class="dot"></span>SBEE OK</span>`;
    }
}

// --- REALTIME (Écoute instantanée des push du simulateur) ---
function startRealtime() {
    const sensorId = document.getElementById('sensorSelector').value;
    if (!sensorId) return;

    supabaseClient
        .channel('schema-db-changes')
        .on('postgres_changes', 
            { event: 'INSERT', schema: 'public', table: 'telemetry', filter: `sensor_id=eq.${sensorId}` }, 
            (payload) => {
                const newData = payload.new;
                
                // Mettre à jour les compteurs
                updateDashboardUI(newData);

                // Ajouter le point au graphique existant en direct
                if (mainChart) {
                    const newTime = new Date(newData.created_at).toLocaleTimeString('fr-FR');
                    mainChart.data.labels.push(newTime);
                    mainChart.data.datasets[0].data.push(newData.power_w);

                    // Conserver une fenêtre glissante de 20 points
                    if (mainChart.data.labels.length > 20) {
                        mainChart.data.labels.shift();
                        mainChart.data.datasets[0].data.shift();
                    }
                    mainChart.update();
                }
            }
        )
        .subscribe();
}

// Initialisation globale au chargement (Tes fonctions d'origine de gestion de droits)
async function initDashboard() {
    // Conserve tes fonctions de droits : canUseMultiSite(), etc.
    await loadDashboard();
    startRealtime();
}
</script>
</body>
</html>
