<script>

/*
=========================================
LOAD AI
=========================================
*/

async function loadAI(){

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return;

}

const userId =
userData.user.id;

const { data:telemetry, error } =
await supabaseClient

.from('telemetry')

.select('*')

.eq('sensor_id',userId);

if(error || !telemetry || telemetry.length===0){

document.getElementById(
'recommendation'
).innerHTML =
'Aucune donnée énergétique disponible.';

return;

}

let totalPower=0;

let groupeCount=0;

telemetry.forEach(item=>{

totalPower += Number(item.power_w);

if(item.source==='GROUPE'){

groupeCount++;

}

});

const avgPower =
Math.round(totalPower/telemetry.length);

let score=95;

if(avgPower>3000){

score-=20;

}

if(groupeCount>5){

score-=15;

}

document.getElementById(
'energyScore'
).innerHTML =
score+'/100';

let recommendation='';

if(score<60){

recommendation =
'Consommation énergétique très élevée détectée. Optimisation urgente recommandée.';

}else if(score<80){

recommendation =
'Installation correcte mais des optimisations sont possibles.';

}else{

recommendation =
'Installation stable et performante.';

}

document.getElementById(
'recommendation'
).innerHTML =
recommendation;

}



</script>
