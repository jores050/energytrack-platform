<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capteurs IoT - EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<style>

.sensor-card{
background:linear-gradient(145deg,#182235,#101826);
padding:25px;
border-radius:24px;
margin-bottom:20px;
}

.sensor-status{
padding:8px 14px;
border-radius:999px;
display:inline-block;
margin-top:15px;
background:rgba(0,200,150,0.15);
color:#00c896;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Energy<span>Track</span>
</div>

<a class="nav-item" href="dashboard.html">🏠 Dashboard</a>
<a class="nav-item" href="consommation.html">⚡ Consommation</a>
<a class="nav-item" href="alertes.html">🔔 Alertes</a>
<a class="nav-item" href="rapports.html">📊 Rapports</a>
<a class="nav-item" href="sites.html">🏢 Multi-sites</a>
<a class="nav-item active" href="capteurs.html">📡 Capteurs IoT</a>
<a class="nav-item" href="ia.html">🤖 Analyse IA</a>

</div>

<div class="main">

<h1>
Capteurs IoT
</h1>

<div id="sensorsContainer">

</div>

</div>

<script>

async function loadSensors(){

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return;

}

const userId =
userData.user.id;

const { data:sites } =
await supabaseClient

.from('sites')

.select('*')

.eq('user_id',userId);

const container =
document.getElementById('sensorsContainer');

container.innerHTML='';

sites.forEach(site=>{

container.innerHTML += `

<div class="sensor-card">

<h2>

${site.name}

</h2>

<p style="
margin-top:15px;
color:#94a3b8;
">

📍 ${site.city}

</p>

<div class="sensor-status">

EN LIGNE

</div>

<p style="
margin-top:20px;
line-height:1.8;
">

ESP32 connecté au cloud EnergyTrack.

</p>

</div>

`;

});

}

loadSensors();

</script>

</body>

</html>
