<script>

async function loadSensors(){

const {

data:userData

}

=

await supabaseClient

.auth

.getUser();

const user=

userData.user;

if(

!user

){

location.href=

'auth.html';

return;

}

const {

data:sites

}

=

await supabaseClient

.from(

'sites'

)

.select(`

*,

sensors(*)

`)

.eq(

'user_id',

user.id

);

const container=

document.getElementById(

'container'

);

container.innerHTML='';

sites.forEach(

site=>{

container.innerHTML+=`

<div class="sensor-card">

<h2>

🏠 ${site.name}

</h2>

${
site.sensors.length===0

?

'<p>Aucun capteur</p>'

:

site.sensors.map(

sensor=>`

<div class="sensor">

<h3>

📡 ${sensor.name}

</h3>

<p>

Type :

${sensor.type}

</p>

<div class="status

${
sensor.status==='ONLINE'

?

'online'

:

'offline'

}">

${sensor.status}

</div>

</div>

`

).join('')
}

</div>

`;

}

);

}

async function addSensor(){

const site =

document

.getElementById(

'site'

).value;

const name =

document

.getElementById(

'name'

).value;

const type =

document

.getElementById(

'type'

).value;

const serial =

document

.getElementById(

'serial'

).value;

const {

error

}

=

await supabaseClient

.from(

'sensors'

)

.insert([{

site_id:
site,

name:
name,

type:
type,

serial_number:
serial,

status:
'ONLINE'

}]);


if(error){

alert(

error.message

);

return;

}

document

.getElementById(

'formContainer'

)

.innerHTML='';

loadSensors();

}
