<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
Capteurs IoT
</title>

<link rel="stylesheet"
href="css/style.css">

<script src="
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2
"></script>

<script src="
js/supabase.js
"></script>

<style>

.sensor-card{

background:

#182235;

padding:

25px;

border-radius:

24px;

margin-bottom:

20px;

}

.sensor{

background:

#101826;

padding:

18px;

border-radius:

16px;

margin-top:

15px;

}

.status{

padding:

8px 12px;

border-radius:

999px;

display:

inline-block;

margin-top:

10px;

}

.online{

background:

rgba(
0,200,150,.15
);

color:

#00c896;

}

.offline{

background:

rgba(
255,76,97,.15
);

color:

#ff4c61;

}

</style>

</head>

<body>

<div class="main">

<h1>

📡 Capteurs

</h1>

<button

onclick="showAddSensor()"

>

Ajouter capteur

</button>

<div id="formContainer">

</div>

<div id="container">

</div>

</div>

<script>

async function loadSensors(){

const {

data:userData

}

=

await supabaseClient

.auth

.getUser();

const user=

userData.user;

if(

!user

){

location.href=

'auth.html';

return;

}

const {

data:sites

}

=

await supabaseClient

.from(

'sites'

)

.select(`

*,

sensors(*)

`)

.eq(

'user_id',

user.id

);

const container=

document

.getElementById(

'container'

);

container.innerHTML='';

sites.forEach(

site=>{

container.innerHTML+=`

<div class="sensor-card">

<h2>

🏠

${site.name}

</h2>

${

site.sensors

.map(

sensor=>`

<div class="sensor">

<h3>

📡

${sensor.name}

</h3>

<p>

Type :

${sensor.type}

</p>

<div

class="status

${

sensor.status==='ONLINE'

?

'online'

:

'offline'

}">

${sensor.status}

</div>

</div>

`

).join('')

}

</div>

`;

}

);

}

async function addSensor(){

const site=

document

.getElementById(

'site'

)

.value;

const name=

document

.getElementById(

'name'

)

.value;

const type=

document

.getElementById(

'type'

)

.value;

await supabaseClient

.from(

'sensors'

)

.insert([{

site_id:

site,

name:

name,

type:

type,

status:

'ONLINE'

}]);

loadSensors();

}

async function showAddSensor(){

const {

data:userData

}

=

await supabaseClient

.auth

.getUser();

const {

data:sites

}

=

await supabaseClient

.from(

'sites'

)

.select('*')

.eq(

'user_id',

userData.user.id

);

document

.getElementById(

'formContainer'

)

.innerHTML=`

<select id="site">

${

sites.map(

s=>

`

<option

value="${s.id}"

>

${s.name}

</option>

`

).join('')

}

</select>

<input

id="name"

placeholder="Nom capteur">

<input

id="type"

placeholder="Type">

<button

onclick="addSensor()"

>

Ajouter

</button>

`;

}

loadSensors();

</script>

</body>

</html>
