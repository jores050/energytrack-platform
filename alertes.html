<h1 style="margin-bottom:20px">
Alertes Intelligentes
</h1>

<div class="alert alert-danger">
⚠️ Surconsommation détectée dans le bâtiment principal.
</div>

<div class="alert alert-warning">
⚡ Coupure SBEE détectée depuis 14h22.
</div>

<div class="alert alert-success">
✅ Réduction possible de 12 000 FCFA/mois.
</div>

<button onclick="generateAlert()">
Générer une nouvelle alerte
</button>

<div id="newAlert"></div>

</div>

<script>

if(localStorage.getItem('sensorConfigured')!=='true'){

window.location.href='auth.html';

}

function generateAlert(){

const alerts=[

'⚠️ Nouvelle surtension détectée sur ET-BJ-002.',

'⚡ Consommation anormale détectée cette nuit.',

'🔋 Groupe électrogène actif depuis 5h.'

];

const random=alerts[Math.floor(Math.random()*alerts.length)];

document.getElementById('newAlert').innerHTML=

'<div class=\"alert alert-warning\">'+random+'</div>';

}

function logoutUser(){

localStorage.clear();

window.location.href='index.html';

}

</script>
