<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alertes EnergyTrack</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<style>

.alert-card{
background:linear-gradient(145deg,#182235,#101826);
padding:22px;
border-radius:24px;
margin-bottom:20px;
border-left:6px solid #ffb547;
transition:0.3s;
}

.alert-card:hover{
transform:translateY(-3px);
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.alert-header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.alert-badge{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:600;
}

.badge-active{
background:rgba(255,181,71,0.15);
color:#ffb547;
}

.badge-critical{
background:rgba(255,76,97,0.15);
color:#ff4c61;
}

.badge-resolved{
background:rgba(0,200,150,0.15);
color:#00c896;
}

.filter-bar{
display:flex;
gap:12px;
flex-wrap:wrap;
margin:25px 0;
}

.filter-btn{
padding:12px 18px;
border:none;
border-radius:14px;
background:#182235;
color:white;
cursor:pointer;
transition:0.3s;
}

.filter-btn:hover{
background:#00c896;
}

.empty-state{
padding:60px;
text-align:center;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Energy<span>Track</span>
</div>

<a class="nav-item" href="dashboard.html">
🏠 Dashboard
</a>

<a class="nav-item" href="consommation.html">
⚡ Consommation
</a>

<a class="nav-item active" href="alertes.html">
🔔 Alertes
</a>

<a class="nav-item" href="rapports.html">
📊 Rapports
</a>

<a class="nav-item" href="sites.html">
🏢 Multi-sites
</a>

<a class="nav-item" href="capteurs.html">
📡 Capteurs IoT
</a>

<a class="nav-item" href="ia.html">
🤖 Analyse IA
</a>

<a class="nav-item" href="parametres.html">
⚙️ Paramètres
</a>

<div class="nav-item"
onclick="logoutUser()">
🚪 Déconnexion
</div>

</div>

<div class="main" style="display:block;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
">

<div>

<h1>
Centre d’Alertes
</h1>

<p style="
margin-top:10px;
color:#94a3b8;
">

Surveillance temps réel des anomalies énergétiques.

</p>

</div>

<div class="alert-badge badge-critical">
Temps réel actif
</div>

</div>

<div class="filter-bar">

<button
class="filter-btn"
onclick="filterAlerts('ALL')">

Toutes

</button>

<button
class="filter-btn"
onclick="filterAlerts('SBEE_OUTAGE')">

Coupures

</button>

<button
class="filter-btn"
onclick="filterAlerts('LOW_VOLTAGE')">

Basse tension

</button>

<button
class="filter-btn"
onclick="filterAlerts('HIGH_VOLTAGE')">

Surtension

</button>

<button
class="filter-btn"
onclick="filterAlerts('OVERCONSUMPTION')">

Surconsommation

</button>

</div>

<div id="alertsContainer">

</div>

</div>

<script>

let currentFilter = 'ALL';

/*
AUTH
*/

async function getUser(){

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return null;

}

return userData.user;

}

/*
LOGOUT
*/

async function logoutUser(){

await supabaseClient.auth.signOut();

window.location.href='auth.html';

}

/*
FILTER
*/

function filterAlerts(type){

currentFilter = type;

loadAlerts();

}

/*
LOAD ALERTS
*/

async function loadAlerts(){

const user =
await getUser();

if(!user){

return;

}

let query =
supabaseClient

.from('alerts')

.select(`
*,
sites(name)
`)

.eq('sensor_id',user.id)

.order('created_at',{ascending:false});

if(currentFilter!=='ALL'){

query =
query.eq('type',currentFilter);

}

const { data:alerts, error } =
await query;

if(error){

console.log(error);

return;

}

const container =
document.getElementById('alertsContainer');

container.innerHTML='';

if(alerts.length===0){

container.innerHTML = `

<div class="empty-state">

<h2>
Aucune alerte
</h2>

<p style="margin-top:15px;">

Aucune anomalie détectée actuellement.

</p>

</div>

`;

return;

}

alerts.forEach(alert=>{

let borderColor='#ffb547';

let badgeClass='badge-active';

if(alert.type==='SBEE_OUTAGE'){

borderColor='#ff4c61';

badgeClass='badge-critical';

}

if(alert.type==='LOW_VOLTAGE'){

borderColor='#ffb547';

badgeClass='badge-active';

}

if(alert.type==='HIGH_VOLTAGE'){

borderColor='#00aeef';

badgeClass='badge-active';

}

if(alert.type==='OVERCONSUMPTION'){

borderColor='#ffd93d';

badgeClass='badge-critical';

}

container.innerHTML += `

<div class="alert-card"
style="border-left-color:${borderColor};">

<div class="alert-header">

<div>

<h2>

${alert.type}

</h2>

<p style="
margin-top:8px;
color:#94a3b8;
font-size:14px;
">

🏢 ${alert.sites?.name || 'Site inconnu'}

</p>

</div>

<div class="alert-badge ${badgeClass}">

${alert.status}

</div>

</div>

<p style="
line-height:1.8;
color:#dbe4f0;
">

${alert.message}

</p>

<div style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
">

<div>

<p style="color:#94a3b8;">
Valeur mesurée
</p>

<h3 style="margin-top:8px;">

${alert.value}

</h3>

</div>

<div>

<p style="color:#94a3b8;">
Seuil
</p>

<h3 style="margin-top:8px;">

${alert.threshold}

</h3>

</div>

<div>

<p style="color:#94a3b8;">
Date
</p>

<h3 style="
margin-top:8px;
font-size:15px;
">

${new Date(alert.created_at)
.toLocaleString()}

</h3>

</div>

</div>

</div>

`;

});

}

/*
INIT
*/

loadAlerts();

/*
REALTIME
*/

supabaseClient

.channel('alerts-live')

.on(

'postgres_changes',

{

event:'INSERT',

schema:'public',

table:'alerts'

},

(payload)=>{

console.log(payload);

loadAlerts();

}

)

.subscribe();

</script>

</body>

</html>
