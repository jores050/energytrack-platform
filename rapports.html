<script src="js/supabase.js"></script>

</head>

<div class="main" style="display:block;">

<h1 style="margin-bottom:20px;">
Rapports Énergétiques
</h1>

<div class="section">

<h2>
Rapport énergétique intelligent
</h2>

<div id="reportContainer">

</div>

</div>

<div class="section">

<h2>
Rapport WhatsApp
</h2>

<p>
Envoyer automatiquement les statistiques énergétiques hebdomadaires.
</p>

<button onclick="sendReport()">
Envoyer le rapport
</button>

<p id="reportStatus" style="margin-top:20px"></p>

</div>

<div class="section">

<h2>
Exporter les données
</h2>

<button onclick="downloadPDF()">
Télécharger PDF
</button>

</div>

</div>

<script>

async function logoutUser(){

await supabaseClient.auth.signOut();

window.location.href='auth.html';

}

async function loadReport(){

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return;

}

const userId = userData.user.id;

/*
RÉCUP TÉLÉMÉTRIE
*/

const { data:telemetry } =
await supabaseClient

.from('telemetry')

.select('*')

.eq('sensor_id',userId);

/*
RÉCUP ALERTES
*/

const { data:alerts } =
await supabaseClient

.from('alerts')

.select('*')

.eq('sensor_id',userId);

/*
CALCULS
*/

let totalKwh=0;

let groupeCount=0;

let avgPower=0;

telemetry.forEach(item=>{

totalKwh += Number(item.kwh_total);

avgPower += Number(item.power_w);

if(item.source==='GROUPE'){

groupeCount++;

}

});

avgPower =
Math.round(avgPower/telemetry.length);

const totalCost =
Math.round(totalKwh * 91);

const groupePercent =
Math.round(

(groupeCount/telemetry.length)*100

);

const outages =
alerts.filter(alert=>

alert.type==='SBEE_OUTAGE'

).length;

/*
IA
*/

let recommendation='';

if(avgPower > 2500){

recommendation =
'Réduction de consommation recommandée pour limiter les coûts énergétiques.';

}else if(groupePercent > 30){

recommendation =
'Utilisation importante du groupe électrogène détectée.';

}else{

recommendation =
'Installation énergétique stable et optimisée.';

}

/*
AFFICHAGE
*/

document.getElementById('reportContainer').innerHTML = `

<div style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
">

<div class="card">

<h3>
⚡ Consommation totale
</h3>

<h1 style="margin-top:15px;">
${totalKwh.toFixed(1)} kWh
</h1>

</div>

<div class="card">

<h3>
💰 Coût estimé
</h3>

<h1 style="margin-top:15px;">
${totalCost.toLocaleString()} FCFA
</h1>

</div>

<div class="card">

<h3>
⛽ Utilisation Groupe
</h3>

<h1 style="margin-top:15px;">
${groupePercent}%
</h1>

</div>

<div class="card">

<h3>
🔔 Coupures détectées
</h3>

<h1 style="margin-top:15px;">
${outages}
</h1>

</div>

</div>

<div class="section"
style="margin-top:25px;">

<h2>
🤖 Recommandation IA
</h2>

<div class="alert alert-warning"
style="margin-top:20px;">

${recommendation}

</div>

</div>

`;

}

function sendReport(){

document.getElementById('reportStatus').innerHTML=
'✅ Rapport WhatsApp envoyé avec succès.';

}

async function downloadPDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

return;

}

const userId = userData.user.id;

/*
RÉCUP DATA
*/

const { data:telemetry } =
await supabaseClient

.from('telemetry')

.select('*')

.eq('sensor_id',userId);

const { data:alerts } =
await supabaseClient

.from('alerts')

.select('*')

.eq('sensor_id',userId);

/*
CALCULS
*/

let totalKwh=0;

let groupeCount=0;

let avgPower=0;

telemetry.forEach(item=>{

totalKwh += Number(item.kwh_total);

avgPower += Number(item.power_w);

if(item.source==='GROUPE'){

groupeCount++;

}

});

avgPower =
Math.round(avgPower/telemetry.length);

const totalCost =
Math.round(totalKwh * 91);

const groupePercent =
Math.round(
(groupeCount/telemetry.length)*100
);

const outages =
alerts.filter(alert=>
alert.type==='SBEE_OUTAGE'
).length;

/*
PDF
*/

doc.setFontSize(22);

doc.text('EnergyTrack - Rapport Energetique',20,25);

doc.setFontSize(12);

doc.text(
'Genere le : '+new Date().toLocaleString(),
20,
35
);

/*
RÉSUMÉ
*/

doc.setFontSize(16);

doc.text('Resume energetique',20,55);

doc.setFontSize(12);

doc.text(
'Consommation totale : '+totalKwh.toFixed(1)+' kWh',
20,
70
);

doc.text(
'Cout estime : '+totalCost.toLocaleString()+' FCFA',
20,
80
);

doc.text(
'Consommation moyenne : '+avgPower+' W',
20,
90
);

doc.text(
'Taux utilisation groupe : '+groupePercent+'%',
20,
100
);

doc.text(
'Coupures detectees : '+outages,
20,
110
);

/*
ALERTES
*/

let y = 135;

doc.setFontSize(16);

doc.text('Alertes recentes',20,y);

y += 15;

alerts.slice(0,5).forEach(alert=>{

if(y>260){

doc.addPage();

y=20;

}

const line =
'- '+alert.type+' | '+alert.message;

doc.setFontSize(11);

doc.text(line,20,y);

y += 12;

});

/*
RECOMMANDATION IA
*/

if(y>230){

doc.addPage();

y=20;

}

let recommendation='';

if(avgPower > 2500){

recommendation =
'Reduction de consommation recommandee pour limiter les couts energetiques.';

}else if(groupePercent > 30){

recommendation =
'Utilisation importante du groupe electrogene detectee.';

}else{

recommendation =
'Installation energetique stable et optimisee.';

}

doc.setFontSize(16);

doc.text('Recommendation IA',20,y+20);

doc.setFontSize(12);

doc.text(recommendation,20,y+35);

/*
SAVE
*/

doc.save('energytrack-report.pdf');

}

/*
LOAD INITIAL
*/

loadReport();

/*
REALTIME
*/

supabaseClient

.channel('reports-live')

.on(

'postgres_changes',

{

event:'INSERT',

schema:'public',

table:'telemetry'

},

(payload)=>{

console.log(payload);

loadReport();

}

)

.subscribe();

</script>

</body>
</html>
