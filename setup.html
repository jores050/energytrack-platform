<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configuration Capteur - EnergyTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b1220;
font-family:'Poppins',sans-serif;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.container{
width:100%;
max-width:760px;
}

.card{
background:linear-gradient(145deg,#182235,#101826);
padding:45px;
border-radius:32px;
border:1px solid rgba(255,255,255,0.05);
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:32px;
font-weight:700;
margin-bottom:35px;
text-align:center;
}

.logo span{
color:#00c896;
}

.badge{
display:inline-block;
background:rgba(0,200,150,0.15);
color:#00c896;
padding:10px 18px;
border-radius:999px;
font-size:13px;
font-weight:700;
margin-bottom:25px;
}

h1{
font-size:42px;
margin-bottom:20px;
line-height:1.3;
}

.subtitle{
color:#94a3b8;
line-height:1.9;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.form-group{
margin-bottom:22px;
}

label{
display:block;
margin-bottom:10px;
font-size:14px;
font-weight:500;
color:#dbe4f0;
}

input,
select{
width:100%;
padding:17px;
border:none;
border-radius:16px;
background:#0f1729;
color:white;
font-size:15px;
outline:none;
}

input::placeholder{
color:#64748b;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00c896,#00aeef);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:30px;
transition:0.3s;
}

button:hover{
opacity:0.92;
transform:translateY(-2px);
}

.status{
margin-top:25px;
padding:18px;
border-radius:16px;
display:none;
}

.success{
background:rgba(0,200,150,0.12);
color:#00c896;
}

.error{
background:rgba(255,76,97,0.12);
color:#ff4c61;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.card{
padding:30px;
}

h1{
font-size:32px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
Energy<span>Track</span>
</div>

<div class="badge">
Configuration initiale
</div>

<h1>

Configurez votre premier capteur énergétique

</h1>

<p class="subtitle">

Ajoutez votre premier site énergétique
et connectez votre capteur IoT EnergyTrack
pour commencer le monitoring temps réel.

</p>

<form id="setupForm">

<div class="grid">

<div class="form-group">

<label>
Nom du site
</label>

<input
type="text"
id="siteName"
placeholder="Ex: Hôtel Marina"
required>

</div>

<div class="form-group">

<label>
Localisation
</label>

<input
type="text"
id="location"
placeholder="Ex: Cotonou"
required>

</div>

</div>

<div class="grid">

<div class="form-group">

<label>
Type de bâtiment
</label>

<select id="buildingType">

<option>
Hôtel
</option>

<option>
Restaurant
</option>

<option>
Maison
</option>

<option>
PME
</option>

<option>
Industrie
</option>

<option>
Supermarché
</option>

</select>

</div>

<div class="form-group">

<label>
Nom du capteur
</label>

<input
type="text"
id="sensorName"
placeholder="Ex: ET-BJ-001"
required>

</div>

</div>

<div class="form-group">

<label>
Numéro de série
</label>

<input
type="text"
id="serialNumber"
placeholder="Ex: DEMO-001"
required>

</div>

<button type="submit">

Finaliser la configuration

</button>

</form>

<div
id="status"
class="status">

</div>

</div>

</div>

<script>

document
.getElementById('setupForm')

.addEventListener(

'submit',

async function(e){

e.preventDefault();

const status =
document.getElementById('status');

try{

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return;

}

const userId =
userData.user.id;

/*
CREATE SITE
*/

const { data:siteData, error:siteError } =
await supabaseClient

.from('sites')

.insert([{

user_id:userId,

name:
document.getElementById('siteName').value,

location:
document.getElementById('location').value,

building_type:
document.getElementById('buildingType').value

}])

.select()

.single();

if(siteError){

throw siteError;

}

/*
CREATE SENSOR
*/

const { error:sensorError } =
await supabaseClient

.from('sensors')

.insert([{

site_id:siteData.id,

sensor_name:
document.getElementById('sensorName').value,

serial_number:
document.getElementById('serialNumber').value,

status:'ACTIVE'

}]);

if(sensorError){

throw sensorError;

}

/*
SUCCESS
*/

status.style.display='block';

status.className='status success';

status.innerHTML=

'✅ Configuration terminée avec succès. Redirection vers le dashboard...';

setTimeout(()=>{

window.location.href='dashboard.html';

},2000);

}catch(error){

console.log(error);

status.style.display='block';

status.className='status error';

status.innerHTML=

'❌ Erreur lors de la configuration du capteur.';

}

}

);

</script>

</body>

</html>
