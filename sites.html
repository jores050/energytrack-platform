```html
<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Multi-sites EnergyTrack
</title>

<link rel="stylesheet"
href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<style>

.site-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-top:25px;
}

.site-card{
background:
linear-gradient(145deg,#182235,#101826);
padding:25px;
border-radius:24px;
border:1px solid rgba(255,255,255,0.05);
transition:0.3s;
}

.site-card:hover{
transform:translateY(-5px);
box-shadow:
0 20px 50px rgba(0,0,0,0.35);
}

.site-badge{
padding:8px 14px;
border-radius:999px;
font-size:12px;
font-weight:600;
background:rgba(0,200,150,0.15);
color:#00c896;
display:inline-block;
}

.form-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.delete-btn{
background:#ff4c61;
margin-top:20px;
}

.empty-state{
text-align:center;
padding:60px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
Energy<span>Track</span>
</div>

<a class="nav-item"
href="dashboard.html">
🏠 Dashboard
</a>

<a class="nav-item"
href="consommation.html">
⚡ Consommation
</a>

<a class="nav-item"
href="alertes.html">
🔔 Alertes
</a>

<a class="nav-item"
href="rapports.html">
📊 Rapports
</a>

<a class="nav-item active"
href="sites.html">
🏢 Multi-sites
</a>

<a class="nav-item"
href="capteurs.html">
📡 Capteurs IoT
</a>

<a class="nav-item"
href="ia.html">
🤖 Analyse IA
</a>

<a class="nav-item"
href="parametres.html">
⚙️ Paramètres
</a>

<div class="nav-item"
onclick="logoutUser()">
🚪 Déconnexion
</div>

</div>

<div class="main"
style="display:block;">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
">

<div>

<h1>
Supervision Multi-sites
</h1>

<p style="
color:#94a3b8;
margin-top:10px;
">

Gestion centralisée
des installations EnergyTrack.

</p>

</div>

<div class="site-badge">
Temps réel actif
</div>

</div>

<div class="section">

<h2>
Ajouter un site
</h2>

<div class="form-grid">

<input type="text"
id="siteName"
placeholder="Nom du site">

<input type="text"
id="siteCity"
placeholder="Ville">

</div>

<input type="text"
id="siteAddress"
placeholder="Adresse complète">

<button

onclick="handleAddSite()"

style="
padding:16px 28px;
border:none;
border-radius:16px;
background:
linear-gradient(90deg,#00c896,#00b4ff);
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
">

Ajouter le site

</button>

</div>

<div class="section">

<h2>
Sites surveillés
</h2>

<div class="site-grid"
id="sitesContainer">

</div>

</div>

</div>

<script>

/*
=========================================
AUTH CHECK
=========================================
*/

async function checkAuth(){

const { data:userData } =
await supabaseClient.auth.getUser();

if(!userData.user){

window.location.href='auth.html';

return null;

}

return userData.user;

}

/*
=========================================
LOGOUT
=========================================
*/

async function logoutUser(){

await supabaseClient.auth.signOut();

window.location.href='auth.html';

}

/*
=========================================
HANDLE ADD SITE
=========================================
*/

async function handleAddSite(){

const allowed =
await canUseMultiSite();

if(!allowed){

window.location.href =
'premium-required.html';

return;

}

createSite();

}

/*
=========================================
CREATE SITE
=========================================
*/

async function createSite(){

const user =
await checkAuth();

if(!user){

return;

}

const name =
document.getElementById(
'siteName'
).value;

const city =
document.getElementById(
'siteCity'
).value;

const address =
document.getElementById(
'siteAddress'
).value;

if(

name===''

||

city===''

||

address===''

){

alert(
'Veuillez remplir tous les champs.'
);

return;

}

const { error } =
await supabaseClient

.from('sites')

.insert([{

user_id:user.id,

name:name,

city:city,

address:address

}]);

if(error){

console.log(error);

alert(error.message);

return;

}

document.getElementById(
'siteName'
).value='';

document.getElementById(
'siteCity'
).value='';

document.getElementById(
'siteAddress'
).value='';

loadSites();

}

/*
=========================================
DELETE SITE
=========================================
*/

async function deleteSite(siteId){

const confirmDelete =
confirm(
'Supprimer ce site ?'
);

if(!confirmDelete){

return;

}

const { error } =
await supabaseClient

.from('sites')

.delete()

.eq('id',siteId);

if(error){

console.log(error);

return;

}

loadSites();

}

/*
=========================================
LOAD SITES
=========================================
*/

async function loadSites(){

const user =
await checkAuth();

if(!user){

return;

}

const { data:sites, error } =
await supabaseClient

.from('sites')

.select('*')

.eq('user_id',user.id)

.order(
'created_at',
{ascending:false}
);

if(error){

console.log(error);

return;

}

const container =
document.getElementById(
'sitesContainer'
);

container.innerHTML='';

if(sites.length===0){

container.innerHTML = `

<div class="empty-state">

<h2>
Aucun site enregistré
</h2>

<p style="margin-top:15px;">

Ajoutez votre premier
site EnergyTrack.

</p>

</div>

`;

return;

}

sites.forEach(site=>{

container.innerHTML += `

<div class="site-card">

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
">

<h2>

${site.name}

</h2>

<div class="site-badge">

ACTIF

</div>

</div>

<p style="
color:#94a3b8;
line-height:1.8;
">

📍 ${site.city}

<br><br>

${site.address}

</p>

<p style="
margin-top:20px;
font-size:13px;
color:#94a3b8;
">

Créé le :
${new Date(
site.created_at
).toLocaleString()}

</p>

<button
class="delete-btn"
onclick="deleteSite('${site.id}')">

Supprimer

</button>

</div>

`;

});

}

/*
=========================================
START REALTIME
=========================================
*/

function startRealtime(){

supabaseClient

.channel('sites-realtime')

.on(

'postgres_changes',

{

event:'*',

schema:'public',

table:'sites'

},

(payload)=>{

console.log(payload);

loadSites();

}

)

.subscribe();

}

/*
=========================================
PROTECT MULTISITE PAGE
=========================================
*/

async function protectMultiSitePage(){

const allowed =
await canUseMultiSite();

if(!allowed){

window.location.href =
'premium-required.html';

return;

}

/*
AUTHORIZED
*/

loadSites();

startRealtime();

}

</script>

<script src="js/feature-access.js"></script>

<script>

/*
=========================================
START
=========================================
*/

protectMultiSitePage();

</script>

</body>

</html>
